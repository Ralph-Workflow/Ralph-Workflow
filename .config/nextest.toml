# cargo-nextest configuration for ralph-workflow
# See https://nexte.st/docs/configuration/ for full reference.

[store]
# Directory for nextest artifacts (test binaries, junit reports, etc.)
dir = "target/nextest"

[profile.default]
# Use all available CPUs for test execution.
# nextest runs each test in its own process, so parallelism is safe by default.
test-threads = "num-cpus"

# Slow test warning threshold — helps identify optimization targets.
slow-timeout = { period = "30s", terminate-after = 3 }

# Retry flaky tests once before reporting failure.
retries = 0

# Fail fast: stop on first failure during CI-like runs.
fail-fast = true

# Status output level — show pass/fail/skip for each test.
status-level = "pass"
final-status-level = "fail"

[profile.default.junit]
# JUnit XML output for CI integration.
path = "target/nextest/junit.xml"

# Profile for git2-system-tests which require serial execution.
# These tests modify shared git repository state and cannot run in parallel.
[profile.serial]
test-threads = 1
