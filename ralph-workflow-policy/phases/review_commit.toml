# phases/review_commit.toml — Normative review commit phase definition
#
# review_commit is the mandatory checkpoint after every successful
# completed review/fix iteration. It:
#   1. Produces a commit_message MCP artifact at .agent/tmp/commit_message.json
#   2. Applies the commit action (deterministically, runtime-owned)
#   3. Increments the review counter
#   4. Routes based on the post-commit guards declared in phases/review.toml:
#      - review    (if review cycles remain)
#      - complete  (if review budget is exhausted)
#
# The canonical commit artifact is .agent/tmp/commit_message.json. Any
# plain-text commit-message file is a secondary plumbing convenience path,
# not the primary policy contract.

phase_id = "review_commit"
origin = "shipped_default"
drain = "commit"
template_key = "review_commit"
artifact_profile = "review_commit"
side_effects = ["submit_review_commit_artifact", "apply_review_commit"]
side_effect_artifact = "commit_message"
side_effect_artifact_path = ".agent/tmp/commit_message.json"
