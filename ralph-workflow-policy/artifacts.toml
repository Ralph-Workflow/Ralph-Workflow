# ---------------------------------------------------------------------------
# artifacts.toml — Normative artifact and prompt contracts shipped by ralph-workflow-policy
#
# This file is an INTERNAL policy document owned by the ralph-workflow-policy
# crate, loaded at compile time. Each table entry is a lookup key referenced
# from phase documents via template_key = "..." or artifact_profile = "...".
#
# For each entry:
#   prompt_template    — template file in ralph-workflow-policy/templates/
#   template_variables — allow-listed variable names the template may reference
#   artifact_type      — canonical MCP artifact type this entry submits
#   submission_mode    — how the artifact is submitted (mcp_artifact)
#   required_sections  — top-level fields required in the artifact payload (optional)
#   status_field       — name of the status field in the artifact (for decision points)
#   allowed_statuses   — valid values for the status field (for decision points)
# ---------------------------------------------------------------------------

[planning]
prompt_template = "planning.txt"
template_variables = [
  "project_goal",
  "current_phase",
  "existing_plan",
  "workspace_scope",
  "relevant_paths",
  "path_contents",
  "available_phase_ids",
  "previous_artifacts",
]
artifact_type = "plan"
required_sections = ["summary", "steps", "critical_files", "verification_strategy"]
submission_mode = "mcp_artifact"

[development]
prompt_template = "developer_iteration.txt"
continuation_template = "developer_iteration_continuation.txt"
template_variables = [
  "task",
  "current_plan",
  "allowed_directories",
  "previous_attempt_summary",
  "relevant_paths",
  "path_contents",
  "selected_files",
  "latest_artifact",
  "iteration_context",
]
artifact_type = "development_result"
submission_mode = "mcp_artifact"

# ---------------------------------------------------------------------------
# development_analysis — embedded decision point inside the development phase.
#
# analysis_decision artifacts use a binary vocabulary:
#   needs_more_work  → return to development (loop stays in current cycle)
#   cycle_complete   → proceed to development_commit (advances cycle counter)
# ---------------------------------------------------------------------------
[development_analysis]
prompt_template = "development_analysis.txt"
template_variables = [
  "task",
  "latest_artifact",
  "current_phase",
  "iteration_context",
  "relevant_paths",
  "path_contents",
  "selected_files",
  "review_issues",
]
artifact_type = "analysis_decision"
submission_mode = "mcp_artifact"
status_field = "status"
allowed_statuses = ["completed", "partial", "failed"]
decision_vocabulary = ["needs_more_work", "cycle_complete"]

# ---------------------------------------------------------------------------
# review_analysis — embedded decision point inside the review phase.
#
# analysis_decision artifacts use a binary vocabulary:
#   needs_more_fix   → return to fix (loop stays in current cycle)
#   cycle_complete   → proceed to review_commit (advances cycle counter)
# ---------------------------------------------------------------------------
[review_analysis]
prompt_template = "review_analysis.txt"
template_variables = [
  "task",
  "latest_artifact",
  "current_phase",
  "iteration_context",
  "relevant_paths",
  "path_contents",
  "selected_files",
  "review_issues",
]
artifact_type = "analysis_decision"
submission_mode = "mcp_artifact"
status_field = "status"
allowed_statuses = ["completed", "partial", "failed"]
decision_vocabulary = ["needs_more_fix", "cycle_complete"]

[review]
prompt_template = "review.txt"
template_variables = [
  "diff_summary",
  "latest_artifact",
  "review_scope",
  "relevant_paths",
  "path_contents",
  "selected_files",
  "current_plan",
]
artifact_type = "issues"
submission_mode = "mcp_artifact"

[fix]
prompt_template = "fix_mode.txt"
template_variables = [
  "review_issues",
  "latest_artifact",
  "allowed_directories",
  "relevant_paths",
  "path_contents",
  "selected_files",
  "current_plan",
]
artifact_type = "fix_result"
submission_mode = "mcp_artifact"

# ---------------------------------------------------------------------------
# development_commit and review_commit share the same artifact shape
# (commit_message) but are separate entries so each can declare distinct
# template files and side-effect paths.
# ---------------------------------------------------------------------------
[development_commit]
prompt_template = "development_commit_message.txt"
template_variables = [
  "staged_changes_summary",
  "selected_files",
  "latest_artifact",
  "diff_summary",
  "relevant_paths",
  "path_contents",
]
artifact_type = "commit_message"
submission_mode = "mcp_artifact"
artifact_output_path = ".agent/tmp/commit_message.json"

[review_commit]
prompt_template = "commit_message.txt"
template_variables = [
  "staged_changes_summary",
  "selected_files",
  "latest_artifact",
  "diff_summary",
  "relevant_paths",
  "path_contents",
]
artifact_type = "commit_message"
submission_mode = "mcp_artifact"
artifact_output_path = ".agent/tmp/commit_message.json"
