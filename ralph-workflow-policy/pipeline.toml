# ---------------------------------------------------------------------------
# pipeline.toml — Normative orchestration policy shipped by ralph-workflow-policy
#
# This file is the canonical definition of the orchestration flow for the
# ralph-workflow pipeline. It is an INTERNAL policy document owned by the
# ralph-workflow-policy crate and loaded at compile time via include_str!.
#
# DO NOT edit this file to customise individual projects. Project-level
# overrides belong in .agent/pipeline.toml alongside agents.toml.
#
# Target flow (from Section 1 of the configurable-orchestration design):
#
#   planning -> development -> development_analysis
#                   ├── back to development (needs_more_work)
#                   └── cycle_complete -> development_commit
#                                        ├── development cycles remain -> planning
#                                        └── development budget exhausted -> review
#
#   review -> fix -> review_analysis
#                ├── back to fix (needs_more_fix)
#                └── cycle_complete -> review_commit
#                                     ├── review cycles remain -> review
#                                     └── review budget exhausted -> complete
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# 1. Phase documents (loaded by the policy crate at startup)
# ---------------------------------------------------------------------------
phase_documents = [
  "phases/planning.toml",
  "phases/development.toml",
  "phases/review.toml",
  "phases/development_commit.toml",
  "phases/review_commit.toml",
]

# ---------------------------------------------------------------------------
# 2. Lifecycle skeleton
# ---------------------------------------------------------------------------
[top_level_phases]
default_sequence = ["planning", "development", "development_commit", "review", "review_commit"]

# ---------------------------------------------------------------------------
# 3. Cycle accounting
#
# One development cycle = planning -> development -> development_analysis,
# completed by a mandatory development_commit checkpoint.
# One review cycle = review -> fix -> review_analysis,
# completed by a mandatory review_commit checkpoint.
#
# Counters advance only after the successful post-commit transition.
# ---------------------------------------------------------------------------
[cycle_accounting]
development_counter_increment_phase = "development_commit"
development_counter_increment_when = "after_development_cycle_completion"
review_counter_increment_phase = "review_commit"
review_counter_increment_when = "after_review_cycle_completion"

# ---------------------------------------------------------------------------
# 4. Budgets
# ---------------------------------------------------------------------------
[budgets]
max_development_cycles = 5
max_review_cycles = 2
max_dev_continuations = 3
max_fix_continuations = 10
loop_detection_threshold = 100

# ---------------------------------------------------------------------------
# 5. Artifact acceptance
# ---------------------------------------------------------------------------
[artifact_acceptance]
require_current_run_identity = true
require_current_drain_identity = true
require_current_namespace_when_present = true

# ---------------------------------------------------------------------------
# 6. Parallel execution
#
# Parallelism is driven by the planning artifact's work_units[] structure.
# No separate parallel_planner phase is introduced. The orchestrator
# interprets work_units[] and dispatches development agents concurrently.
# ---------------------------------------------------------------------------
[parallel_execution]
source = "planning_artifact_work_units"
require_namespaces = true
require_directory_scopes = true
dispatch_remains_runtime_owned = true
max_concurrent_agents = 20
default_concurrent_agents = 5

# ---------------------------------------------------------------------------
# 7. Phase side effects
#
# These are policy-visible side effects that Ralph must execute at specific
# commit phases. Each entry names the side-effect contract; phases reference
# them by name via side_effects = ["..."].
# ---------------------------------------------------------------------------
[phase_side_effects.submit_development_commit_artifact]
artifact_type = "commit_message"
output_path = ".agent/tmp/commit_message.json"
mode = "submit_mcp_artifact"

[phase_side_effects.apply_development_commit]
artifact_type = "commit_message"
action = "apply_commit"

[phase_side_effects.submit_review_commit_artifact]
artifact_type = "commit_message"
output_path = ".agent/tmp/commit_message.json"
mode = "submit_mcp_artifact"

[phase_side_effects.apply_review_commit]
artifact_type = "commit_message"
action = "apply_commit"

# ---------------------------------------------------------------------------
# 8. Validation toggles
# ---------------------------------------------------------------------------
[validation]
require_explicit_drain_bindings = true
forbid_sibling_drain_inference = true
preserve_runtime_execution_order = true
reject_unbound_phase_documents = true
reject_unbound_phase_transitions = true
