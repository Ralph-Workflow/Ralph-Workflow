name: Publish Python package

on:
  push:
    tags:
      - "ralph-python-v*"
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install release tooling
        working-directory: ralph-python
        run: |
          python -m pip install --upgrade pip
          python -m pip install hatch twine

      - name: Build package
        working-directory: ralph-python
        run: hatch build

      - name: Validate package metadata
        working-directory: ralph-python
        run: python -m twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ralph-python-dist
          path: ralph-python/dist/*

  publish:
    name: Publish to PyPI
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/ralph-python-v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/ralph-workflow/
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: ralph-python-dist
          path: dist/

      - name: Publish to PyPI via trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
