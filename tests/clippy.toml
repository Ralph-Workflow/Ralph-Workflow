# ============================================================================
# LINT POLICY FILE -- STYLE GUIDE FIRST.
#
# This package contains integration and system tests. Keep the normal testing
# style by default, and only keep exceptions that are explicitly justified by
# the repository testing and boundary docs.
#
# Reference docs when fixing violations:
#   - CODE_STYLE.md
#   - docs/code-style/testing.md
#   - docs/code-style/boundaries.md
#   - docs/code-style/coding-patterns.md
#   - docs/tooling/dylint.md
# ============================================================================

too-many-lines-threshold = 500
max-struct-bools = 32

# --- Test strictness: no escape hatches ---
allow-unwrap-in-tests = false
allow-expect-in-tests = false
allow-panic-in-tests = false
allow-print-in-tests = false
allow-indexing-slicing-in-tests = false

# --- Iterator loops ---
enforce-iter-loop-reborrow = true

# --- Arithmetic ---
arithmetic-side-effects-allowed = ["*"]

# --- Disallowed types (interior mutability / shared mutable state) ---
# NOTE: boundary-aware interior-mutability policy belongs in dylint, not in a
# blanket clippy type deny list.
disallowed-types = []

# --- Disallowed methods (mutation / imperative patterns) ---
# NOTE: boundary-aware mutating-method policy belongs in dylint, not in a
# blanket clippy method deny list.
disallowed-methods = []

# --- Disallowed macros (side effects) ---
disallowed-macros = [
  { path = "std::dbg", reason = "No debug leftovers; use assertions or test diagnostics instead" },
]
