# ============================================================================
# LINT POLICY FILE -- DO NOT WEAKEN, DISABLE, OR RELAX RULES WITHOUT EXPLICIT
# USER/MAINTAINER DIRECTION. REFACTOR THE CODE INSTEAD. "BEING LAZY TO
# REFACTOR" IS NOT A VALID REASON TO CHANGE LINTING BEHAVIOR. THE ONLY
# EXCEPTION IS DOCUMENTED AUTOGENERATED CODE HANDLED BY THE REPOSITORY'S
# APPROVED MECHANISM.
# ============================================================================
# Package-local clippy configuration for ralph-workflow-tests.

too-many-lines-threshold = 500
max-struct-bools = 32

# --- Test strictness: no escape hatches ---
allow-unwrap-in-tests = false
allow-expect-in-tests = false
allow-panic-in-tests = false
allow-print-in-tests = false
allow-indexing-slicing-in-tests = false

# --- Iterator loops ---
enforce-iter-loop-reborrow = true

# --- Arithmetic ---
arithmetic-side-effects-allowed = []

# --- Disallowed types (interior mutability / shared mutable state) ---
disallowed-types = [
  { path = "std::cell::Cell", reason = "Avoid interior mutability in application code" },
  { path = "std::cell::RefCell", reason = "Avoid interior mutability in application code" },
  { path = "std::sync::Mutex", reason = "Keep mutable shared state at the outermost boundary only" },
  { path = "std::sync::RwLock", reason = "Keep mutable shared state at the outermost boundary only" },
  { path = "std::sync::OnceLock", reason = "Avoid global mutable initialization patterns" },
  { path = "std::sync::LazyLock", reason = "Avoid global mutable initialization patterns" },
]

# --- Disallowed methods (mutation / imperative patterns) ---
disallowed-methods = [
  { path = "std::option::Option::unwrap", reason = "Use match/map/and_then/or_else" },
  { path = "std::result::Result::unwrap", reason = "Use ? / map_err / match" },
  { path = "std::result::Result::expect", reason = "Use ? / explicit error handling" },

  { path = "std::vec::Vec::push", reason = "Prefer iterator pipelines and collect" },
  { path = "std::vec::Vec::append", reason = "Prefer structural transforms or iterator composition" },
  { path = "std::vec::Vec::insert", reason = "Prefer structural transforms" },
  { path = "std::vec::Vec::remove", reason = "Prefer structural transforms" },
  { path = "std::vec::Vec::retain", reason = "Prefer iterator-based filtering into a new value" },
  { path = "std::vec::Vec::sort", reason = "Prefer non-mutating sorted transformations at boundaries" },
  { path = "std::vec::Vec::sort_unstable", reason = "Prefer non-mutating sorted transformations at boundaries" },
]

# --- Disallowed macros (side effects) ---
disallowed-macros = [
  { path = "std::println", reason = "Keep effects at the edge" },
  { path = "std::eprintln", reason = "Keep effects at the edge" },
  { path = "std::dbg", reason = "No debug leftovers" },
]
