              - listitem [ref=e481]:
                - text: Tool names
                - strong [ref=e482]: SHOULD
                - text: be considered case-sensitive.
              - listitem [ref=e483]:
                - text: The following
                - strong [ref=e484]: SHOULD
                - text: "be the only allowed characters: uppercase and lowercase ASCII letters (A-Z, a-z), digits (0-9), underscore (_), hyphen (-), and dot (.)"
              - listitem [ref=e485]:
                - text: Tool names
                - strong [ref=e486]: SHOULD NOT
                - text: contain spaces, commas, or other special characters.
              - listitem [ref=e487]:
