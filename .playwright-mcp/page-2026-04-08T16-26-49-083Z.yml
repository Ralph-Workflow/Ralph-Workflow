                - generic [ref=e866]:
                  - strong [ref=e867]: Tool Execution Errors
                  - text: ": Reported in tool results with"
                  - code [ref=e868]: "isError: true"
                  - text: ":"
                - list [ref=e869]:
                  - listitem [ref=e870]: API failures
                  - listitem [ref=e871]: Input validation errors (e.g., date in wrong format, value out of range)
                  - listitem [ref=e872]: Business logic errors
            - generic [ref=e873]:
              - strong [ref=e874]: Tool Execution Errors
              - text: contain actionable feedback that language models can use to self-correct and retry with adjusted parameters.
              - strong [ref=e875]: Protocol Errors
              - text: indicate issues with the request structure itself that models are less likely to be able to fix. Clients
              - strong [ref=e876]: SHOULD
              - text: provide tool execution errors to language models to enable self-correction. Clients
              - strong [ref=e877]: MAY
              - text: provide protocol errors to language models, though these are less likely to result in successful recovery.
