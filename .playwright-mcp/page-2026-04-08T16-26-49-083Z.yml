          - generic [ref=e184]:
            - generic [ref=e185]: The Model Context Protocol (MCP) allows servers to expose tools that can be invoked by language models. Tools enable models to interact with external systems, such as querying databases, calling APIs, or performing computations. Each tool is uniquely identified by a name and includes metadata describing its schema.
            - heading "Navigate to header User Interaction Model" [level=2] [ref=e186]:
              - link "Navigate to header" [ref=e187] [cursor=pointer]:
                - /url: "#user-interaction-model"
                - img [ref=e189]
              - generic [ref=e191] [cursor=pointer]: User Interaction Model
            - generic [ref=e192]:
              - text: Tools in MCP are designed to be
              - strong [ref=e193]: model-controlled
              - text: ", meaning that the language model can discover and invoke tools automatically based on its contextual understanding and the user’s prompts."
            - generic [ref=e194]: However, implementations are free to expose tools through any interface pattern that suits their needs—the protocol itself does not mandate any specific user interaction model.
            - generic [ref=e195]:
              - img "Warning" [ref=e197]
              - generic [ref=e199]:
                - generic [ref=e200]:
                  - text: For trust & safety and security, there
                  - strong [ref=e201]: SHOULD
                  - text: always be a human in the loop with the ability to deny tool invocations.
                - generic [ref=e202]:
                  - text: Applications
                  - strong [ref=e203]: SHOULD
                  - text: ":"
                - list [ref=e204]:
                  - listitem [ref=e205]: Provide UI that makes clear which tools are being exposed to the AI model
                  - listitem [ref=e206]: Insert clear visual indicators when tools are invoked
                  - listitem [ref=e207]: Present confirmation prompts to the user for operations, to ensure a human is in the loop
            - heading "Navigate to header Capabilities" [level=2] [ref=e208]:
              - link "Navigate to header" [ref=e209] [cursor=pointer]:
                - /url: "#capabilities"
                - img [ref=e211]
