                  - listitem [ref=e435]:
                    - text: Defaults to 2020-12 if no
                    - code [ref=e436]: $schema
                    - text: field is present
                  - listitem [ref=e437]:
                    - strong [ref=e438]: MUST
                    - text: be a valid JSON Schema object (not
                    - code [ref=e439]: "null"
                    - text: )
                  - listitem [ref=e440]:
                    - text: "For tools with no parameters, use one of these valid approaches:"
                    - list [ref=e441]:
                      - listitem [ref=e442]:
                        - code [ref=e443]: "{ \"type\": \"object\", \"additionalProperties\": false }"
                        - text: "-"
                        - strong [ref=e444]: Recommended
                        - text: ": explicitly accepts only empty objects"
                      - listitem [ref=e445]:
                        - code [ref=e446]: "{ \"type\": \"object\" }"
                        - text: "- accepts any object (including with properties)"
              - listitem [ref=e447]:
                - code [ref=e448]: outputSchema
                - text: ": Optional JSON Schema defining expected output structure"
                - list [ref=e449]:
                  - listitem [ref=e450]:
                    - text: Follows the
