              - generic [ref=e196] [cursor=pointer]: Purpose and Scope
            - generic [ref=e197]: The Model Context Protocol provides authorization capabilities at the transport level, enabling MCP clients to make requests to restricted MCP servers on behalf of resource owners. This specification defines the authorization flow for HTTP-based transports.
            - heading "Navigate to header Protocol Requirements" [level=3] [ref=e198]:
              - link "Navigate to header" [ref=e199] [cursor=pointer]:
                - /url: "#protocol-requirements"
                - img [ref=e201]
              - generic [ref=e203] [cursor=pointer]: Protocol Requirements
            - generic [ref=e204]:
              - text: Authorization is
              - strong [ref=e205]: OPTIONAL
              - text: "for MCP implementations. When supported:"
            - list [ref=e206]:
              - listitem [ref=e207]:
                - text: Implementations using an HTTP-based transport
                - strong [ref=e208]: SHOULD
                - text: conform to this specification.
              - listitem [ref=e209]:
                - text: Implementations using an STDIO transport
                - strong [ref=e210]: SHOULD NOT
                - text: follow this specification, and instead retrieve credentials from the environment.
              - listitem [ref=e211]:
                - text: Implementations using alternative transports
                - strong [ref=e212]: MUST
                - text: follow established security best practices for their protocol.
            - heading "Navigate to header Standards Compliance" [level=3] [ref=e213]:
              - link "Navigate to header" [ref=e214] [cursor=pointer]:
                - /url: "#standards-compliance"
                - img [ref=e216]
              - generic [ref=e218] [cursor=pointer]: Standards Compliance
            - generic [ref=e219]: "This authorization mechanism is based on established specifications listed below, but implements a selected subset of their features to ensure security and interoperability while maintaining simplicity:"
            - list [ref=e220]:
              - listitem [ref=e221]:
                - text: OAuth 2.1 IETF DRAFT (
                - link "draft-ietf-oauth-v2-1-13" [ref=e222] [cursor=pointer]:
                  - /url: https://datatracker.ietf.org/doc/html/draft-ietf-oauth-v2-1-13
                - text: )
              - listitem [ref=e223]:
                - text: OAuth 2.0 Authorization Server Metadata (
                - link "RFC8414" [ref=e224] [cursor=pointer]:
                  - /url: https://datatracker.ietf.org/doc/html/rfc8414
                - text: )
              - listitem [ref=e225]:
                - text: OAuth 2.0 Dynamic Client Registration Protocol (
                - link "RFC7591" [ref=e226] [cursor=pointer]:
                  - /url: https://datatracker.ietf.org/doc/html/rfc7591
                - text: )
              - listitem [ref=e227]:
                - text: OAuth 2.0 Protected Resource Metadata (
                - link "RFC9728" [ref=e228] [cursor=pointer]:
                  - /url: https://datatracker.ietf.org/doc/html/rfc9728
                - text: )
              - listitem [ref=e229]:
                - text: OAuth Client ID Metadata Documents (
                - link "draft-ietf-oauth-client-id-metadata-document-00" [ref=e230] [cursor=pointer]:
                  - /url: https://datatracker.ietf.org/doc/html/draft-ietf-oauth-client-id-metadata-document-00
                - text: )
            - heading "Navigate to header Roles" [level=2] [ref=e231]:
              - link "Navigate to header" [ref=e232] [cursor=pointer]:
                - /url: "#roles"
                - img [ref=e234]
              - generic [ref=e236] [cursor=pointer]: Roles
            - generic [ref=e237]:
              - text: A protected
              - emphasis [ref=e238]: MCP server
              - text: acts as an
              - link "OAuth 2.1 resource server" [ref=e239] [cursor=pointer]:
                - /url: https://www.ietf.org/archive/id/draft-ietf-oauth-v2-1-13.html#name-roles
              - text: ", capable of accepting and responding to protected resource requests using access tokens."
            - generic [ref=e240]:
              - text: An
              - emphasis [ref=e241]: MCP client
              - text: acts as an
              - link "OAuth 2.1 client" [ref=e242] [cursor=pointer]:
                - /url: https://www.ietf.org/archive/id/draft-ietf-oauth-v2-1-13.html#name-roles
              - text: ", making protected resource requests on behalf of a resource owner."
            - generic [ref=e243]:
              - text: The
              - emphasis [ref=e244]: authorization server
              - text: is responsible for interacting with the user (if necessary) and issuing access tokens for use at the MCP server. The implementation details of the authorization server are beyond the scope of this specification. It may be hosted with the resource server or a separate entity. The
              - link "Authorization Server Discovery section" [ref=e245] [cursor=pointer]:
                - /url: "#authorization-server-discovery"
              - text: specifies how an MCP server indicates the location of its corresponding authorization server to a client.
            - heading "Navigate to header Overview" [level=2] [ref=e246]:
              - link "Navigate to header" [ref=e247] [cursor=pointer]:
                - /url: "#overview"
                - img [ref=e249]
              - generic [ref=e251] [cursor=pointer]: Overview
            - list [ref=e252]:
              - listitem [ref=e253]:
                - generic [ref=e254]:
                  - text: Authorization servers
                  - strong [ref=e255]: MUST
                  - text: implement OAuth 2.1 with appropriate security measures for both confidential and public clients.
              - listitem [ref=e256]:
                - generic [ref=e257]:
                  - text: Authorization servers and MCP clients
                  - strong [ref=e258]: SHOULD
                  - text: support OAuth Client ID Metadata Documents (
                  - link "draft-ietf-oauth-client-id-metadata-document-00" [ref=e259] [cursor=pointer]:
                    - /url: https://datatracker.ietf.org/doc/html/draft-ietf-oauth-client-id-metadata-document-00
                  - text: ).
              - listitem [ref=e260]:
                - generic [ref=e261]:
                  - text: Authorization servers and MCP clients
                  - strong [ref=e262]: MAY
                  - text: support the OAuth 2.0 Dynamic Client Registration Protocol (
                  - link "RFC7591" [ref=e263] [cursor=pointer]:
                    - /url: https://datatracker.ietf.org/doc/html/rfc7591
                  - text: ).
              - listitem [ref=e264]:
                - generic [ref=e265]:
                  - text: MCP servers
                  - strong [ref=e266]: MUST
                  - text: implement OAuth 2.0 Protected Resource Metadata (
                  - link "RFC9728" [ref=e267] [cursor=pointer]:
                    - /url: https://datatracker.ietf.org/doc/html/rfc9728
                  - text: ). MCP clients
                  - strong [ref=e268]: MUST
                  - text: use OAuth 2.0 Protected Resource Metadata for authorization server discovery.
              - listitem [ref=e269]:
                - generic [ref=e270]:
                  - text: MCP authorization servers
                  - strong [ref=e271]: MUST
                  - text: "provide at least one of the following discovery mechanisms:"
                - list [ref=e272]:
                  - listitem [ref=e273]:
                    - text: OAuth 2.0 Authorization Server Metadata (
                    - link "RFC8414" [ref=e274] [cursor=pointer]:
                      - /url: https://datatracker.ietf.org/doc/html/rfc8414
                    - text: )
                  - listitem [ref=e275]:
                    - link "OpenID Connect Discovery 1.0" [ref=e276] [cursor=pointer]:
                      - /url: https://openid.net/specs/openid-connect-discovery-1_0.html
                - generic [ref=e277]:
                  - text: MCP clients
                  - strong [ref=e278]: MUST
                  - text: support both discovery mechanisms to obtain the information required to interact with the authorization server.
            - heading "Navigate to header Authorization Server Discovery" [level=2] [ref=e279]:
              - link "Navigate to header" [ref=e280] [cursor=pointer]:
                - /url: "#authorization-server-discovery"
                - img [ref=e282]
              - generic [ref=e284] [cursor=pointer]: Authorization Server Discovery
            - generic [ref=e285]: This section describes the mechanisms by which MCP servers advertise their associated authorization servers to MCP clients, as well as the discovery process through which MCP clients can determine authorization server endpoints and supported capabilities.
            - heading "Navigate to header Authorization Server Location" [level=3] [ref=e286]:
              - link "Navigate to header" [ref=e287] [cursor=pointer]:
                - /url: "#authorization-server-location"
                - img [ref=e289]
              - generic [ref=e291] [cursor=pointer]: Authorization Server Location
            - generic [ref=e292]:
              - text: MCP servers
              - strong [ref=e293]: MUST
              - text: implement the OAuth 2.0 Protected Resource Metadata (
              - link "RFC9728" [ref=e294] [cursor=pointer]:
                - /url: https://datatracker.ietf.org/doc/html/rfc9728
              - text: ) specification to indicate the locations of authorization servers. The Protected Resource Metadata document returned by the MCP server
              - strong [ref=e295]: MUST
              - text: include the
              - code [ref=e296]: authorization_servers
              - text: field containing at least one authorization server.
            - generic [ref=e297]:
              - text: The specific use of
              - code [ref=e298]: authorization_servers
              - text: is beyond the scope of this specification; implementers should consult OAuth 2.0 Protected Resource Metadata (
              - link "RFC9728" [ref=e299] [cursor=pointer]:
                - /url: https://datatracker.ietf.org/doc/html/rfc9728
              - text: ) for guidance on implementation details.
            - generic [ref=e300]:
              - text: Implementors should note that Protected Resource Metadata documents can define multiple authorization servers. The responsibility for selecting which authorization server to use lies with the MCP client, following the guidelines specified in
              - link "RFC9728 Section 7.6 “Authorization Servers”" [ref=e301] [cursor=pointer]:
                - /url: https://datatracker.ietf.org/doc/html/rfc9728#name-authorization-servers
              - text: .
            - heading "Navigate to header Protected Resource Metadata Discovery Requirements" [level=3] [ref=e302]:
              - link "Navigate to header" [ref=e303] [cursor=pointer]:
                - /url: "#protected-resource-metadata-discovery-requirements"
                - img [ref=e305]
              - generic [ref=e307] [cursor=pointer]: Protected Resource Metadata Discovery Requirements
            - generic [ref=e308]:
              - text: MCP servers
              - strong [ref=e309]: MUST
              - text: "implement one of the following discovery mechanisms to provide authorization server location information to MCP clients:"
            - list [ref=e310]:
              - listitem [ref=e311]:
                - generic [ref=e312]:
                  - strong [ref=e313]: WWW-Authenticate Header
                  - text: ": Include the resource metadata URL in the"
                  - code [ref=e314]: WWW-Authenticate
                  - text: HTTP header under
                  - code [ref=e315]: resource_metadata
                  - text: when returning
                  - code [ref=e316]: 401 Unauthorized
                  - text: responses, as described in
                  - link "RFC9728 Section 5.1" [ref=e317] [cursor=pointer]:
                    - /url: https://datatracker.ietf.org/doc/html/rfc9728#name-www-authenticate-response
                  - text: .
              - listitem [ref=e318]:
                - generic [ref=e319]:
                  - strong [ref=e320]: Well-Known URI
                  - text: ": Serve metadata at a well-known URI as specified in"
                  - link "RFC9728" [ref=e321] [cursor=pointer]:
                    - /url: https://datatracker.ietf.org/doc/html/rfc9728
                  - text: ". This can be either:"
                - list [ref=e322]:
                  - listitem [ref=e323]:
                    - text: "At the path of the server’s MCP endpoint:"
                    - code [ref=e324]: https://example.com/public/mcp
                    - text: could host metadata at
                    - code [ref=e325]: https://example.com/.well-known/oauth-protected-resource/public/mcp
                  - listitem [ref=e326]:
                    - text: "At the root:"
                    - code [ref=e327]: https://example.com/.well-known/oauth-protected-resource
            - generic [ref=e328]:
              - text: MCP clients
              - strong [ref=e329]: MUST
              - text: support both discovery mechanisms and use the resource metadata URL from the parsed
              - code [ref=e330]: WWW-Authenticate
              - text: headers when present; otherwise, they
              - strong [ref=e331]: MUST
              - text: fall back to constructing and requesting the well-known URIs in the order listed above.
            - generic [ref=e332]:
              - text: MCP servers
              - strong [ref=e333]: SHOULD
              - text: include a
              - code [ref=e334]: scope
              - text: parameter in the
              - code [ref=e335]: WWW-Authenticate
              - text: header as defined in
              - link "RFC 6750 Section 3" [ref=e336] [cursor=pointer]:
                - /url: https://datatracker.ietf.org/doc/html/rfc6750#section-3
              - text: to indicate the scopes required for accessing the resource. This provides clients with immediate guidance on the appropriate scopes to request during authorization, following the principle of least privilege and preventing clients from requesting excessive permissions.
            - generic [ref=e337]:
              - text: The scopes included in the
              - code [ref=e338]: WWW-Authenticate
              - text: challenge
              - strong [ref=e339]: MAY
              - text: match
              - code [ref=e340]: scopes_supported
              - text: ", be a subset or superset of it, or an alternative collection that is neither a strict subset nor superset. Clients"
              - strong [ref=e341]: MUST NOT
              - text: assume any particular set relationship between the challenged scope set and
              - code [ref=e342]: scopes_supported
              - text: . Clients
              - strong [ref=e343]: MUST
              - text: treat the scopes provided in the challenge as authoritative for satisfying the current request. Servers
              - strong [ref=e344]: SHOULD
              - text: strive for consistency in how they construct scope sets but they are not required to surface every dynamically issued scope through
              - code [ref=e345]: scopes_supported
              - text: .
            - generic [ref=e346]: "Example 401 response with scope guidance:"
            - generic [ref=e347]:
              - button "Copy the contents from the code block" [ref=e350] [cursor=pointer]:
                - img [ref=e351]
              - code [ref=e357]:
                - generic [ref=e358]: HTTP/1.1 401 Unauthorized
                - generic [ref=e359]: "WWW-Authenticate: Bearer resource_metadata=\"https://mcp.example.com/.well-known/oauth-protected-resource\","
                - generic [ref=e360]: scope="files:read"
            - generic [ref=e361]:
              - text: MCP clients
              - strong [ref=e362]: MUST
              - text: be able to parse
              - code [ref=e363]: WWW-Authenticate
              - text: headers and respond appropriately to
              - code [ref=e364]: HTTP 401 Unauthorized
              - text: responses from the MCP server.
            - generic [ref=e365]:
              - text: If the
              - code [ref=e366]: scope
              - text: parameter is absent, clients
              - strong [ref=e367]: SHOULD
              - text: apply the fallback behavior defined in the
              - link "Scope Selection Strategy" [ref=e368] [cursor=pointer]:
                - /url: "#scope-selection-strategy"
              - text: section.
            - heading "Navigate to header Authorization Server Metadata Discovery" [level=3] [ref=e369]:
              - link "Navigate to header" [ref=e370] [cursor=pointer]:
                - /url: "#authorization-server-metadata-discovery"
