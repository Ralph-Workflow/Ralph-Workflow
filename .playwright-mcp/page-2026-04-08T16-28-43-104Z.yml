            - generic [ref=e788]:
              - text: When implementing authorization flows, MCP clients
              - strong [ref=e789]: SHOULD
              - text: follow the principle of least privilege by requesting only the scopes necessary for their intended operations. During the initial authorization handshake, MCP clients
              - strong [ref=e790]: SHOULD
              - text: "follow this priority order for scope selection:"
            - list [ref=e791]:
              - listitem [ref=e792]:
                - strong [ref=e793]:
                  - text: Use
                  - code [ref=e794]: scope
                  - text: parameter
                - text: from the initial
                - code [ref=e795]: WWW-Authenticate
                - text: header in the 401 response, if provided
              - listitem [ref=e796]:
                - strong [ref=e797]:
                  - text: If
                  - code [ref=e798]: scope
                  - text: is not available
                - text: ", use all scopes defined in"
                - code [ref=e799]: scopes_supported
                - text: from the Protected Resource Metadata document, omitting the
                - code [ref=e800]: scope
                - text: parameter if
                - code [ref=e801]: scopes_supported
                - text: is undefined.
            - generic [ref=e802]: This approach accommodates the general-purpose nature of MCP clients, which typically lack domain-specific knowledge to make informed decisions about individual scope selection. Requesting all available scopes allows the authorization server and end-user to determine appropriate permissions during the consent process.
            - generic [ref=e803]:
              - text: This approach minimizes user friction while following the principle of least privilege. The
              - code [ref=e804]: scopes_supported
              - text: field is intended to represent the minimal set of scopes necessary for basic functionality (see
              - link "Scope Minimization" [ref=e805] [cursor=pointer]:
                - /url: /specification/2025-11-25/basic/security_best_practices#scope-minimization
              - text: ), with additional scopes requested incrementally through the step-up authorization flow steps described in the
              - link "Scope Challenge Handling" [ref=e806] [cursor=pointer]:
                - /url: "#scope-challenge-handling"
              - text: section.
