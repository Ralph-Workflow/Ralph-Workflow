            - heading "Navigate to header Scope Challenge Handling" [level=3] [ref=e1099]:
              - link "Navigate to header" [ref=e1100] [cursor=pointer]:
                - /url: "#scope-challenge-handling"
                - img [ref=e1102]
              - generic [ref=e1104] [cursor=pointer]: Scope Challenge Handling
            - generic [ref=e1105]:
              - text: This section covers handling insufficient scope errors during runtime operations when a client already has a token but needs additional permissions. This follows the error handling patterns defined in
              - link "OAuth 2.1 Section 5" [ref=e1106] [cursor=pointer]:
                - /url: https://datatracker.ietf.org/doc/html/draft-ietf-oauth-v2-1-13#section-5
              - text: and leverages the metadata fields from
              - link "RFC 9728 (OAuth 2.0 Protected Resource Metadata)" [ref=e1107] [cursor=pointer]:
                - /url: https://datatracker.ietf.org/doc/html/rfc9728
              - text: .
            - heading "Navigate to header Runtime Insufficient Scope Errors" [level=4] [ref=e1108]:
              - link "Navigate to header" [ref=e1109] [cursor=pointer]:
                - /url: "#runtime-insufficient-scope-errors"
                - img [ref=e1111]
              - generic [ref=e1113] [cursor=pointer]: Runtime Insufficient Scope Errors
            - generic [ref=e1114]:
              - text: When a client makes a request with an access token with insufficient scope during runtime operations, the server
              - strong [ref=e1115]: SHOULD
              - text: "respond with:"
            - list [ref=e1116]:
              - listitem [ref=e1117]:
                - code [ref=e1118]: HTTP 403 Forbidden
                - text: status code (per
                - link "RFC 6750 Section 3.1" [ref=e1119] [cursor=pointer]:
                  - /url: https://datatracker.ietf.org/doc/html/rfc6750#section-3.1
                - text: )
              - listitem [ref=e1120]:
                - code [ref=e1121]: WWW-Authenticate
                - text: header with the
                - code [ref=e1122]: Bearer
                - text: "scheme and additional parameters:"
                - list [ref=e1123]:
                  - listitem [ref=e1124]:
                    - code [ref=e1125]: error="insufficient_scope"
                    - text: "- indicating the specific type of authorization failure"
                  - listitem [ref=e1126]:
                    - code [ref=e1127]: scope="required_scope1 required_scope2"
                    - text: "- specifying the minimum scopes needed for the operation"
                  - listitem [ref=e1128]:
                    - code [ref=e1129]: resource_metadata
                    - text: "- the URI of the Protected Resource Metadata document (for consistency with 401 responses)"
                  - listitem [ref=e1130]:
                    - code [ref=e1131]: error_description
                    - text: (optional) - human-readable description of the error
            - generic [ref=e1132]:
              - strong [ref=e1133]: Server Scope Management
              - text: ": When responding with insufficient scope errors, servers"
              - strong [ref=e1134]: SHOULD
              - text: include the scopes needed to satisfy the current request in the
              - code [ref=e1135]: scope
              - text: parameter.
            - generic [ref=e1136]: "Servers have flexibility in determining which scopes to include:"
            - list [ref=e1137]:
              - listitem [ref=e1138]:
                - strong [ref=e1139]: Minimum approach
                - text: ": Include the newly-required scopes for the specific operation. Include any existing granted scopes as well, if they are required, to prevent clients from losing previously granted permissions."
              - listitem [ref=e1140]:
                - strong [ref=e1141]: Recommended approach
                - text: ": Include both existing relevant scopes and newly required scopes to prevent clients from losing previously granted permissions"
              - listitem [ref=e1142]:
                - strong [ref=e1143]: Extended approach
                - text: ": Include existing scopes, newly required scopes, and related scopes that commonly work together"
            - generic [ref=e1144]: The choice depends on the server’s assessment of user experience impact and authorization friction.
            - generic [ref=e1145]:
              - text: Servers
              - strong [ref=e1146]: SHOULD
              - text: be consistent in their scope inclusion strategy to provide predictable behavior for clients.
            - generic [ref=e1147]:
              - text: Servers
              - strong [ref=e1148]: SHOULD
              - text: consider the user experience impact when determining which scopes to include in the response, as misconfigured scopes may require frequent user interaction.
            - generic [ref=e1149]: "Example insufficient scope response:"
            - generic [ref=e1150]:
              - button "Copy the contents from the code block" [ref=e1153] [cursor=pointer]:
                - img [ref=e1154]
              - code [ref=e1160]:
                - generic [ref=e1161]: HTTP/1.1 403 Forbidden
                - generic [ref=e1162]: "WWW-Authenticate: Bearer error=\"insufficient_scope\","
                - generic [ref=e1163]: scope="files:read files:write user:profile",
                - generic [ref=e1164]: resource_metadata="https://mcp.example.com/.well-known/oauth-protected-resource",
                - generic [ref=e1165]: error_description="Additional file write permission required"
            - heading "Navigate to header Step-Up Authorization Flow" [level=4] [ref=e1166]:
              - link "Navigate to header" [ref=e1167] [cursor=pointer]:
                - /url: "#step-up-authorization-flow"
                - img [ref=e1169]
              - generic [ref=e1171] [cursor=pointer]: Step-Up Authorization Flow
            - generic [ref=e1172]:
              - text: Clients will receive scope-related errors during initial authorization or at runtime (
              - code [ref=e1173]: insufficient_scope
              - text: ). Clients
              - strong [ref=e1174]: SHOULD
              - text: respond to these errors by requesting a new access token with an increased set of scopes via a step-up authorization flow or handle the errors in other, appropriate ways. Clients acting on behalf of a user
              - strong [ref=e1175]: SHOULD
              - text: attempt the step-up authorization flow. Clients acting on their own behalf (
              - code [ref=e1176]: client_credentials
              - text: clients)
              - strong [ref=e1177]: MAY
              - text: attempt the step-up authorization flow or abort the request immediately.
            - generic [ref=e1178]: "The flow is as follows:"
            - list [ref=e1179]:
              - listitem [ref=e1180]:
                - strong [ref=e1181]: Parse error information
                - text: from the authorization server response or
                - code [ref=e1182]: WWW-Authenticate
                - text: header
              - listitem [ref=e1183]:
                - strong [ref=e1184]: Determine required scopes
                - text: as outlined in
                - link "Scope Selection Strategy" [ref=e1185] [cursor=pointer]:
                  - /url: "#scope-selection-strategy"
                - text: .
              - listitem [ref=e1186]:
                - strong [ref=e1187]: Initiate (re-)authorization
                - text: with the determined scope set
              - listitem [ref=e1188]:
                - strong [ref=e1189]: Retry the original request
                - text: with the new authorization no more than a few times and treat this as a permanent authorization failure
            - generic [ref=e1190]:
              - text: Clients
              - strong [ref=e1191]: SHOULD
              - text: implement retry limits and
              - strong [ref=e1192]: SHOULD
              - text: track scope upgrade attempts to avoid repeated failures for the same resource and operation combination.
            - heading "Navigate to header Security Considerations" [level=2] [ref=e1193]:
              - link "Navigate to header" [ref=e1194] [cursor=pointer]:
                - /url: "#security-considerations"
                - img [ref=e1196]
              - generic [ref=e1198] [cursor=pointer]: Security Considerations
            - generic [ref=e1199]:
              - text: Implementations
              - strong [ref=e1200]: MUST
              - text: follow OAuth 2.1 security best practices as laid out in
              - link "OAuth 2.1 Section 7. “Security Considerations”" [ref=e1201] [cursor=pointer]:
                - /url: https://datatracker.ietf.org/doc/html/draft-ietf-oauth-v2-1-13#name-security-considerations
              - text: .
            - heading "Navigate to header Token Audience Binding and Validation" [level=3] [ref=e1202]:
              - link "Navigate to header" [ref=e1203] [cursor=pointer]:
                - /url: "#token-audience-binding-and-validation"
                - img [ref=e1205]
              - generic [ref=e1207] [cursor=pointer]: Token Audience Binding and Validation
            - generic [ref=e1208]:
              - link "RFC 8707" [ref=e1209] [cursor=pointer]:
                - /url: https://www.rfc-editor.org/rfc/rfc8707.html
              - text: Resource Indicators provide critical security benefits by binding tokens to their intended audiences
              - strong [ref=e1210]: when the Authorization Server supports the capability
              - text: ". To enable current and future adoption:"
            - list [ref=e1211]:
              - listitem [ref=e1212]:
                - text: MCP clients
                - strong [ref=e1213]: MUST
                - text: include the
                - code [ref=e1214]: resource
                - text: parameter in authorization and token requests as specified in the
                - link "Resource Parameter Implementation" [ref=e1215] [cursor=pointer]:
                  - /url: "#resource-parameter-implementation"
                - text: section
              - listitem [ref=e1216]:
                - text: MCP servers
                - strong [ref=e1217]: MUST
                - text: validate that tokens presented to them were specifically issued for their use
            - generic [ref=e1218]:
              - text: The
              - link "Security Best Practices document" [ref=e1219] [cursor=pointer]:
                - /url: /specification/2025-11-25/basic/security_best_practices#token-passthrough
              - text: outlines why token audience validation is crucial and why token passthrough is explicitly forbidden.
            - heading "Navigate to header Token Theft" [level=3] [ref=e1220]:
              - link "Navigate to header" [ref=e1221] [cursor=pointer]:
                - /url: "#token-theft"
                - img [ref=e1223]
              - generic [ref=e1225] [cursor=pointer]: Token Theft
            - generic [ref=e1226]: Attackers who obtain tokens stored by the client, or tokens cached or logged on the server can access protected resources with requests that appear legitimate to resource servers.
            - generic [ref=e1227]:
              - text: Clients and servers
              - strong [ref=e1228]: MUST
              - text: implement secure token storage and follow OAuth best practices, as outlined in
              - link "OAuth 2.1, Section 7.1" [ref=e1229] [cursor=pointer]:
                - /url: https://datatracker.ietf.org/doc/html/draft-ietf-oauth-v2-1-13#section-7.1
              - text: .
            - generic [ref=e1230]:
              - text: Authorization servers
              - strong [ref=e1231]: SHOULD
              - text: issue short-lived access tokens to reduce the impact of leaked tokens. For public clients, authorization servers
              - strong [ref=e1232]: MUST
              - text: rotate refresh tokens as described in
              - link "OAuth 2.1 Section 4.3.1 “Token Endpoint Extension”" [ref=e1233] [cursor=pointer]:
                - /url: https://datatracker.ietf.org/doc/html/draft-ietf-oauth-v2-1-13#section-4.3.1
              - text: .
            - heading "Navigate to header Communication Security" [level=3] [ref=e1234]:
              - link "Navigate to header" [ref=e1235] [cursor=pointer]:
                - /url: "#communication-security"
                - img [ref=e1237]
              - generic [ref=e1239] [cursor=pointer]: Communication Security
            - generic [ref=e1240]:
              - text: Implementations
              - strong [ref=e1241]: MUST
              - text: follow
              - link "OAuth 2.1 Section 1.5 “Communication Security”" [ref=e1242] [cursor=pointer]:
                - /url: https://datatracker.ietf.org/doc/html/draft-ietf-oauth-v2-1-13#section-1.5
              - text: .
            - generic [ref=e1243]: "Specifically:"
            - list [ref=e1244]:
              - listitem [ref=e1245]:
                - text: All authorization server endpoints
                - strong [ref=e1246]: MUST
                - text: be served over HTTPS.
              - listitem [ref=e1247]:
                - text: All redirect URIs
                - strong [ref=e1248]: MUST
                - text: be either
                - code [ref=e1249]: localhost
                - text: or use HTTPS.
            - heading "Navigate to header Authorization Code Protection" [level=3] [ref=e1250]:
              - link "Navigate to header" [ref=e1251] [cursor=pointer]:
                - /url: "#authorization-code-protection"
                - img [ref=e1253]
              - generic [ref=e1255] [cursor=pointer]: Authorization Code Protection
            - generic [ref=e1256]:
              - text: An attacker who has gained access to an authorization code contained in an authorization response can try to redeem the authorization code for an access token or otherwise make use of the authorization code. (Further described in
              - link "OAuth 2.1 Section 7.5" [ref=e1257] [cursor=pointer]:
                - /url: https://datatracker.ietf.org/doc/html/draft-ietf-oauth-v2-1-13#section-7.5
              - text: )
            - generic [ref=e1258]:
              - text: To mitigate this, MCP clients
              - strong [ref=e1259]: MUST
              - text: implement PKCE according to
              - link "OAuth 2.1 Section 7.5.2" [ref=e1260] [cursor=pointer]:
                - /url: https://datatracker.ietf.org/doc/html/draft-ietf-oauth-v2-1-13#section-7.5.2
              - text: and
              - strong [ref=e1261]: MUST
              - text: verify PKCE support before proceeding with authorization. PKCE helps prevent authorization code interception and injection attacks by requiring clients to create a secret verifier-challenge pair, ensuring that only the original requestor can exchange an authorization code for tokens.
            - generic [ref=e1262]:
              - text: MCP clients
              - strong [ref=e1263]: MUST
              - text: use the
              - code [ref=e1264]: S256
              - text: code challenge method when technically capable, as required by
              - link "OAuth 2.1 Section 4.1.1" [ref=e1265] [cursor=pointer]:
                - /url: https://datatracker.ietf.org/doc/html/draft-ietf-oauth-v2-1-13#section-4.1.1
              - text: .
            - generic [ref=e1266]:
              - text: Since OAuth 2.1 and PKCE specifications do not define a mechanism for clients to discover PKCE support, MCP clients
              - strong [ref=e1267]: MUST
              - text: "rely on authorization server metadata to verify this capability:"
            - list [ref=e1268]:
              - listitem [ref=e1269]:
                - generic [ref=e1270]:
                  - strong [ref=e1271]: OAuth 2.0 Authorization Server Metadata
                  - text: ": If"
                  - code [ref=e1272]: code_challenge_methods_supported
                  - text: is absent, the authorization server does not support PKCE and MCP clients
                  - strong [ref=e1273]: MUST
                  - text: refuse to proceed.
              - listitem [ref=e1274]:
                - generic [ref=e1275]:
                  - strong [ref=e1276]: OpenID Connect Discovery 1.0
                  - text: ": While the"
                  - link "OpenID Provider Metadata" [ref=e1277] [cursor=pointer]:
                    - /url: https://openid.net/specs/openid-connect-discovery-1_0.html#ProviderMetadata
                  - text: does not define
                  - code [ref=e1278]: code_challenge_methods_supported
                  - text: ", this field is commonly included by OpenID providers. MCP clients"
                  - strong [ref=e1279]: MUST
                  - text: verify the presence of
                  - code [ref=e1280]: code_challenge_methods_supported
                  - text: in the provider metadata response. If the field is absent, MCP clients
                  - strong [ref=e1281]: MUST
                  - text: refuse to proceed.
            - generic [ref=e1282]:
              - text: Authorization servers providing OpenID Connect Discovery 1.0
              - strong [ref=e1283]: MUST
              - text: include
              - code [ref=e1284]: code_challenge_methods_supported
              - text: in their metadata to ensure MCP compatibility.
            - heading "Navigate to header Open Redirection" [level=3] [ref=e1285]:
              - link "Navigate to header" [ref=e1286] [cursor=pointer]:
                - /url: "#open-redirection"
                - img [ref=e1288]
              - generic [ref=e1290] [cursor=pointer]: Open Redirection
            - generic [ref=e1291]: An attacker may craft malicious redirect URIs to direct users to phishing sites.
            - generic [ref=e1292]:
              - text: MCP clients
              - strong [ref=e1293]: MUST
              - text: have redirect URIs registered with the authorization server.
            - generic [ref=e1294]:
              - text: Authorization servers
              - strong [ref=e1295]: MUST
              - text: validate exact redirect URIs against pre-registered values to prevent redirection attacks.
            - generic [ref=e1296]:
              - text: MCP clients
              - strong [ref=e1297]: SHOULD
              - text: use and verify state parameters in the authorization code flow and discard any results that do not include or have a mismatch with the original state.
            - generic [ref=e1298]:
              - text: Authorization servers
              - strong [ref=e1299]: MUST
              - text: take precautions to prevent redirecting user agents to untrusted URI’s, following suggestions laid out in
              - link "OAuth 2.1 Section 7.12.2" [ref=e1300] [cursor=pointer]:
                - /url: https://datatracker.ietf.org/doc/html/draft-ietf-oauth-v2-1-13#section-7.12.2
            - generic [ref=e1301]:
              - text: Authorization servers
              - strong [ref=e1302]: SHOULD
              - text: only automatically redirect the user agent if it trusts the redirection URI. If the URI is not trusted, the authorization server MAY inform the user and rely on the user to make the correct decision.
            - heading "Navigate to header Client ID Metadata Document Security" [level=3] [ref=e1303]:
              - link "Navigate to header" [ref=e1304] [cursor=pointer]:
                - /url: "#client-id-metadata-document-security"
                - img [ref=e1306]
              - generic [ref=e1308] [cursor=pointer]: Client ID Metadata Document Security
            - generic [ref=e1309]:
              - text: When implementing Client ID Metadata Documents, authorization servers
              - strong [ref=e1310]: MUST
              - text: consider the security implications detailed in
              - link "OAuth Client ID Metadata Document, Section 6" [ref=e1311] [cursor=pointer]:
                - /url: https://datatracker.ietf.org/doc/html/draft-ietf-oauth-client-id-metadata-document-00#name-security-considerations
              - text: ". Key considerations include:"
            - heading "Navigate to header Authorization Server Abuse Protection" [level=4] [ref=e1312]:
              - link "Navigate to header" [ref=e1313] [cursor=pointer]:
                - /url: "#authorization-server-abuse-protection"
                - img [ref=e1315]
              - generic [ref=e1317] [cursor=pointer]: Authorization Server Abuse Protection
            - generic [ref=e1318]: The authorization server takes a URL as input from an unknown client and fetches that URL. A malicious client could use this to trigger the authorization server to make requests to arbitrary URLs, such as requests to private administration endpoints the authorization server has access to.
            - generic [ref=e1319]:
              - text: Authorization servers fetching metadata documents
              - strong [ref=e1320]: SHOULD
              - text: consider
              - link "Server-Side Request Forgery (SSRF)" [ref=e1321] [cursor=pointer]:
                - /url: https://developer.mozilla.org/docs/Web/Security/Attacks/SSRF
              - text: risks, as described in
              - 'link "OAuth Client ID Metadata Document: Server Side Request Forgery (SSRF) Attacks" [ref=e1322] [cursor=pointer]':
                - /url: https://datatracker.ietf.org/doc/html/draft-ietf-oauth-client-id-metadata-document-00#name-server-side-request-forgery
              - text: .
            - heading "Navigate to header Localhost Redirect URI Risks" [level=4] [ref=e1323]:
              - link "Navigate to header" [ref=e1324] [cursor=pointer]:
                - /url: "#localhost-redirect-uri-risks"
                - img [ref=e1326]
              - generic [ref=e1328] [cursor=pointer]: Localhost Redirect URI Risks
            - generic [ref=e1329]:
              - text: Client ID Metadata Documents cannot prevent
              - code [ref=e1330]: localhost
              - text: "URL impersonation by themselves. An attacker can claim to be any client by:"
            - list [ref=e1331]:
              - listitem [ref=e1332]:
                - text: Providing the legitimate client’s metadata URL as their
                - code [ref=e1333]: client_id
              - listitem [ref=e1334]:
                - text: Binding to the any
                - code [ref=e1335]: localhost
                - text: port, and providing that address as the redirect_uri
              - listitem [ref=e1336]: Receiving the authorization code via the redirect when the user approves
            - generic [ref=e1337]: The server will see the legitimate client’s metadata document and the user will see the legitimate client’s name, making attack detection difficult.
            - generic [ref=e1338]: "Authorization servers:"
            - list [ref=e1339]:
              - listitem [ref=e1340]:
                - strong [ref=e1341]: SHOULD
                - text: display additional warnings for
                - code [ref=e1342]: localhost
                - text: "-only redirect URIs"
              - listitem [ref=e1343]:
                - strong [ref=e1344]: MAY
                - text: require additional attestation mechanisms for enhanced security
              - listitem [ref=e1345]:
                - strong [ref=e1346]: MUST
                - text: clearly display the redirect URI hostname during authorization
            - heading "Navigate to header Trust Policies" [level=4] [ref=e1347]:
              - link "Navigate to header" [ref=e1348] [cursor=pointer]:
                - /url: "#trust-policies"
                - img [ref=e1350]
              - generic [ref=e1352] [cursor=pointer]: Trust Policies
            - generic [ref=e1353]:
              - text: Authorization servers
              - strong [ref=e1354]: MAY
              - text: "implement domain-based trust policies:"
            - list [ref=e1355]:
              - listitem [ref=e1356]: Allowlists for trusted domains (for protected servers)
              - listitem [ref=e1357]:
                - text: Accept any HTTPS
                - code [ref=e1358]: client_id
                - text: (for open servers)
              - listitem [ref=e1359]: Reputation checks for unknown domains
              - listitem [ref=e1360]: Restrictions based on domain age or certificate validation
              - listitem [ref=e1361]: Display the CIMD and other associated client hostnames prominently to prevent phishing
            - generic [ref=e1362]: Servers maintain full control over their access policies.
            - heading "Navigate to header Confused Deputy Problem" [level=3] [ref=e1363]:
              - link "Navigate to header" [ref=e1364] [cursor=pointer]:
                - /url: "#confused-deputy-problem"
                - img [ref=e1366]
              - generic [ref=e1368] [cursor=pointer]: Confused Deputy Problem
            - generic [ref=e1369]:
              - text: Attackers can exploit MCP servers acting as intermediaries to third-party APIs, leading to
              - link "confused deputy vulnerabilities" [ref=e1370] [cursor=pointer]:
                - /url: /specification/2025-11-25/basic/security_best_practices#confused-deputy-problem
              - text: . By using stolen authorization codes, they can obtain access tokens without user consent.
            - generic [ref=e1371]:
              - text: MCP proxy servers using static client IDs
              - strong [ref=e1372]: MUST
              - text: obtain user consent for each dynamically registered client before forwarding to third-party authorization servers (which may require additional consent).
            - heading "Navigate to header Access Token Privilege Restriction" [level=3] [ref=e1373]:
              - link "Navigate to header" [ref=e1374] [cursor=pointer]:
                - /url: "#access-token-privilege-restriction"
                - img [ref=e1376]
              - generic [ref=e1378] [cursor=pointer]: Access Token Privilege Restriction
            - generic [ref=e1379]: An attacker can gain unauthorized access or otherwise compromise an MCP server if the server accepts tokens issued for other resources.
            - generic [ref=e1380]: "This vulnerability has two critical dimensions:"
            - list [ref=e1381]:
              - listitem [ref=e1382]:
                - strong [ref=e1383]: Audience validation failures.
                - text: When an MCP server doesn’t verify that tokens were specifically intended for it (for example, via the audience claim, as mentioned in
                - link "RFC9068" [ref=e1384] [cursor=pointer]:
                  - /url: https://www.rfc-editor.org/rfc/rfc9068.html
                - text: ), it may accept tokens originally issued for other services. This breaks a fundamental OAuth security boundary, allowing attackers to reuse legitimate tokens across different services than intended.
              - listitem [ref=e1385]:
                - strong [ref=e1386]: Token passthrough.
                - text: If the MCP server not only accepts tokens with incorrect audiences but also forwards these unmodified tokens to downstream services, it can potentially cause the
                - link "“confused deputy” problem" [ref=e1387] [cursor=pointer]:
                  - /url: "#confused-deputy-problem"
                - text: ", where the downstream API may incorrectly trust the token as if it came from the MCP server or assume the token was validated by the upstream API. See the"
                - link "Token Passthrough section" [ref=e1388] [cursor=pointer]:
                  - /url: /specification/2025-11-25/basic/security_best_practices#token-passthrough
                - text: of the Security Best Practices guide for additional details.
            - generic [ref=e1389]:
              - text: MCP servers
              - strong [ref=e1390]: MUST
              - text: validate access tokens before processing the request, ensuring the access token is issued specifically for the MCP server, and take all necessary steps to ensure no data is returned to unauthorized parties.
            - generic [ref=e1391]:
              - text: A MCP server
              - strong [ref=e1392]: MUST
              - text: follow the guidelines in
              - link "OAuth 2.1 - Section 5.2" [ref=e1393] [cursor=pointer]:
                - /url: https://www.ietf.org/archive/id/draft-ietf-oauth-v2-1-13.html#section-5.2
              - text: to validate inbound tokens.
            - generic [ref=e1394]:
              - text: MCP servers
              - strong [ref=e1395]: MUST
              - text: only accept tokens specifically intended for themselves and
              - strong [ref=e1396]: MUST
              - text: reject tokens that do not include them in the audience claim or otherwise verify that they are the intended recipient of the token. See the
              - link "Security Best Practices Token Passthrough section" [ref=e1397] [cursor=pointer]:
                - /url: /specification/2025-11-25/basic/security_best_practices#token-passthrough
              - text: for details.
            - generic [ref=e1398]:
              - text: If the MCP server makes requests to upstream APIs, it may act as an OAuth client to them. The access token used at the upstream API is a separate token, issued by the upstream authorization server. The MCP server
              - strong [ref=e1399]: MUST NOT
              - text: pass through the token it received from the MCP client.
            - generic [ref=e1400]:
              - text: MCP clients
              - strong [ref=e1401]: MUST
              - text: implement and use the
              - code [ref=e1402]: resource
              - text: parameter as defined in
              - link "RFC 8707 - Resource Indicators for OAuth 2.0" [ref=e1403] [cursor=pointer]:
                - /url: https://www.rfc-editor.org/rfc/rfc8707.html
              - text: to explicitly specify the target resource for which the token is being requested. This requirement aligns with the recommendation in
              - link "RFC 9728 Section 7.4" [ref=e1404] [cursor=pointer]:
                - /url: https://datatracker.ietf.org/doc/html/rfc9728#section-7.4
              - text: . This ensures that access tokens are bound to their intended resources and cannot be misused across different services.
            - heading "Navigate to header MCP Authorization Extensions" [level=2] [ref=e1405]:
              - link "Navigate to header" [ref=e1406] [cursor=pointer]:
                - /url: "#mcp-authorization-extensions"
                - img [ref=e1408]
              - generic [ref=e1410] [cursor=pointer]: MCP Authorization Extensions
            - generic [ref=e1411]: "There are several authorization extensions to the core protocol that define additional authorization mechanisms. These extensions are:"
            - list [ref=e1412]:
              - listitem [ref=e1413]:
                - strong [ref=e1414]: Optional
                - text: "- Implementations can choose to adopt these extensions"
              - listitem [ref=e1415]:
                - strong [ref=e1416]: Additive
                - text: "- Extensions do not modify or break core protocol functionality; they add new capabilities while preserving core protocol behavior"
              - listitem [ref=e1417]:
                - strong [ref=e1418]: Composable
                - text: "- Extensions are modular and designed to work together without conflicts, allowing implementations to adopt multiple extensions simultaneously"
              - listitem [ref=e1419]:
                - strong [ref=e1420]: Versioned independently
                - text: "- Extensions follow the core MCP versioning cycle but may adopt independent versioning as needed"
            - generic [ref=e1421]:
              - text: A list of supported extensions can be found in the
              - link "MCP Authorization Extensions" [ref=e1422] [cursor=pointer]:
                - /url: https://github.com/modelcontextprotocol/ext-auth
              - text: repository.
