              - generic [ref=e1055] [cursor=pointer]: Token Handling
            - generic [ref=e1056]:
              - text: MCP servers, acting in their role as an OAuth 2.1 resource server,
              - strong [ref=e1057]: MUST
              - text: validate access tokens as described in
              - link "OAuth 2.1 Section 5.2" [ref=e1058] [cursor=pointer]:
                - /url: https://datatracker.ietf.org/doc/html/draft-ietf-oauth-v2-1-13#section-5.2
              - text: . MCP servers
              - strong [ref=e1059]: MUST
              - text: validate that access tokens were issued specifically for them as the intended audience, according to
              - link "RFC 8707 Section 2" [ref=e1060] [cursor=pointer]:
                - /url: https://www.rfc-editor.org/rfc/rfc8707.html#section-2
              - text: . If validation fails, servers
              - strong [ref=e1061]: MUST
              - text: respond according to
              - link "OAuth 2.1 Section 5.3" [ref=e1062] [cursor=pointer]:
                - /url: https://datatracker.ietf.org/doc/html/draft-ietf-oauth-v2-1-13#section-5.3
              - text: error handling requirements. Invalid or expired tokens
              - strong [ref=e1063]: MUST
              - text: receive a HTTP 401 response.
            - generic [ref=e1064]:
              - text: MCP clients
              - strong [ref=e1065]: MUST NOT
              - text: send tokens to the MCP server other than ones issued by the MCP server’s authorization server.
            - generic [ref=e1066]:
              - text: MCP servers
              - strong [ref=e1067]: MUST
              - text: only accept tokens that are valid for use with their own resources.
            - generic [ref=e1068]:
              - text: MCP servers
              - strong [ref=e1069]: MUST NOT
              - text: accept or transit any other tokens.
            - heading "Navigate to header Error Handling" [level=2] [ref=e1070]:
