            - generic [ref=e541]:
              - text: MCP clients and authorization servers
              - strong [ref=e542]: SHOULD
              - text: support OAuth Client ID Metadata Documents as specified in
              - link "OAuth Client ID Metadata Document" [ref=e543] [cursor=pointer]:
                - /url: https://datatracker.ietf.org/doc/html/draft-ietf-oauth-client-id-metadata-document-00
              - text: . This approach enables clients to use HTTPS URLs as client identifiers, where the URL points to a JSON document containing client metadata. This addresses the common MCP scenario where servers and clients have no pre-existing relationship.
            - heading "Navigate to header Implementation Requirements" [level=4] [ref=e544]:
