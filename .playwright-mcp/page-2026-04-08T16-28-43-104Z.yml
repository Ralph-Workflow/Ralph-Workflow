              - generic [ref=e517] [cursor=pointer]: Client Registration Approaches
            - generic [ref=e518]: "MCP supports three client registration mechanisms. Choose based on your scenario:"
            - list [ref=e519]:
              - listitem [ref=e520]:
                - strong [ref=e521]: Client ID Metadata Documents
                - text: ": When client and server have no prior relationship (most common)"
              - listitem [ref=e522]:
                - strong [ref=e523]: Pre-registration
                - text: ": When client and server have an existing relationship"
              - listitem [ref=e524]:
                - strong [ref=e525]: Dynamic Client Registration
                - text: ": For backwards compatibility or specific requirements"
            - generic [ref=e526]:
              - text: Clients supporting all options
              - strong [ref=e527]: SHOULD
              - text: "follow the following priority order:"
            - list [ref=e528]:
              - listitem [ref=e529]: Use pre-registered client information for the server if the client has it available
              - listitem [ref=e530]:
                - text: Use Client ID Metadata Documents if the Authorization Server indicates if the server supports it (via
                - code [ref=e531]: client_id_metadata_document_supported
                - text: in OAuth Authorization Server Metadata)
              - listitem [ref=e532]:
                - text: Use Dynamic Client Registration as a fallback if the Authorization Server supports it (via
                - code [ref=e533]: registration_endpoint
                - text: in OAuth Authorization Server Metadata)
              - listitem [ref=e534]: Prompt the user to enter the client information if no other option is available
            - heading "Navigate to header Client ID Metadata Documents" [level=3] [ref=e535]:
              - link "Navigate to header" [ref=e536] [cursor=pointer]:
