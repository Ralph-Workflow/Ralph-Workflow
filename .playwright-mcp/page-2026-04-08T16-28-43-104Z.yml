              - generic [ref=e374] [cursor=pointer]: Authorization Server Metadata Discovery
            - generic [ref=e375]:
              - text: To handle different issuer URL formats and ensure interoperability with both OAuth 2.0 Authorization Server Metadata and OpenID Connect Discovery 1.0 specifications, MCP clients
              - strong [ref=e376]: MUST
              - text: attempt multiple well-known endpoints when discovering authorization server metadata.
            - generic [ref=e377]:
              - text: The discovery approach is based on
              - link "RFC8414 Section 3.1 “Authorization Server Metadata Request”" [ref=e378] [cursor=pointer]:
                - /url: https://datatracker.ietf.org/doc/html/rfc8414#section-3.1
              - text: for OAuth 2.0 Authorization Server Metadata discovery and
              - link "RFC8414 Section 5 “Compatibility Notes”" [ref=e379] [cursor=pointer]:
                - /url: https://datatracker.ietf.org/doc/html/rfc8414#section-5
              - text: for OpenID Connect Discovery 1.0 interoperability.
            - generic [ref=e380]:
              - text: For issuer URLs with path components (e.g.,
              - code [ref=e381]: https://auth.example.com/tenant1
              - text: ), clients
              - strong [ref=e382]: MUST
              - text: "try endpoints in the following priority order:"
            - list [ref=e383]:
              - listitem [ref=e384]:
                - text: "OAuth 2.0 Authorization Server Metadata with path insertion:"
                - code [ref=e385]: https://auth.example.com/.well-known/oauth-authorization-server/tenant1
              - listitem [ref=e386]:
                - text: "OpenID Connect Discovery 1.0 with path insertion:"
                - code [ref=e387]: https://auth.example.com/.well-known/openid-configuration/tenant1
              - listitem [ref=e388]:
                - text: "OpenID Connect Discovery 1.0 path appending:"
                - code [ref=e389]: https://auth.example.com/tenant1/.well-known/openid-configuration
            - generic [ref=e390]:
              - text: For issuer URLs without path components (e.g.,
              - code [ref=e391]: https://auth.example.com
              - text: ), clients
              - strong [ref=e392]: MUST
              - text: "try:"
            - list [ref=e393]:
              - listitem [ref=e394]:
                - text: "OAuth 2.0 Authorization Server Metadata:"
                - code [ref=e395]: https://auth.example.com/.well-known/oauth-authorization-server
              - listitem [ref=e396]:
                - text: "OpenID Connect Discovery 1.0:"
