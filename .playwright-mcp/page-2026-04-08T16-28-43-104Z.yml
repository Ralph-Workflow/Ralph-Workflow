                - /url: "#error-handling"
                - img [ref=e1073]
              - generic [ref=e1075] [cursor=pointer]: Error Handling
            - generic [ref=e1076]:
              - text: Servers
              - strong [ref=e1077]: MUST
              - text: "return appropriate HTTP status codes for authorization errors:"
            - table [ref=e1080]:
              - rowgroup [ref=e1081]:
                - row "Status Code Description Usage" [ref=e1082]:
                  - columnheader "Status Code" [ref=e1083]
                  - columnheader "Description" [ref=e1084]
                  - columnheader "Usage" [ref=e1085]
              - rowgroup [ref=e1086]:
                - row "401 Unauthorized Authorization required or token invalid" [ref=e1087]:
                  - cell "401" [ref=e1088]
