              - listitem [ref=e558]:
                - text: The
                - code [ref=e559]: client_id
                - text: URL
                - strong [ref=e560]: MUST
                - text: use the “https” scheme and contain a path component, e.g.
                - code [ref=e561]: https://example.com/client.json
              - listitem [ref=e562]:
                - text: The metadata document
                - strong [ref=e563]: MUST
                - text: "include at least the following properties:"
