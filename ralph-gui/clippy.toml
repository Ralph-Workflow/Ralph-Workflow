# ============================================================================
# LINT POLICY FILE -- STYLE GUIDE FIRST.
#
# `ralph-gui` is a framework-facing boundary crate. Keep the normal repository
# style whenever possible and document the smallest necessary Tauri-specific
# exception locally.
#
# Reference docs when fixing violations:
#   - CODE_STYLE.md
#   - docs/code-style/boundaries.md
#   - docs/code-style/testing.md
#   - docs/code-style/coding-patterns.md
# ============================================================================

# `println!` remains valid in `build.rs` for Cargo rerun directives, but `dbg!`
# should still never ship.
disallowed-macros = [
  { path = "std::dbg", reason = "No debug leftovers; keep GUI diagnostics intentional" },
]

# Test-only exceptions are limited to framework/boundary-shaped code paths.
allow-unwrap-in-tests = true
allow-expect-in-tests = true
allow-indexing-slicing-in-tests = true
allow-panic-in-tests = true
allow-print-in-tests = true
