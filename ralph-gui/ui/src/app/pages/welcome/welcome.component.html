<div class="flex items-center justify-center h-full bg-bg-base">
  <div class="flex flex-col items-center gap-6 p-12 bg-bg-surface border border-border-subtle rounded-lg max-w-[480px] w-full text-center">
    <div class="flex items-center gap-3">
      <div class="w-12 h-12 bg-accent text-bg-base rounded-xl text-2xl font-bold flex items-center justify-center">R</div>
      <div class="flex flex-col items-start">
        <span class="text-xl font-bold text-text-primary leading-none">Ralph</span>
        <span class="text-xs text-text-muted uppercase tracking-[0.1em]">workflow</span>
      </div>
    </div>

    <h1 class="text-xl font-semibold text-text-primary m-0">No workspaces open</h1>
    <p class="text-sm text-text-secondary m-0 leading-normal">Open a Git repository to start managing Ralph workflow sessions.</p>

    @if (errorMessageValue) {
      <div class="error-banner flex items-center gap-2 px-4 py-2.5 bg-red-500/10 border border-red-500/30 rounded text-red-500 text-[13px] w-full text-left">
        <span>⚠</span>
        <span>{{ errorMessageValue }}</span>
      </div>
    }

    <button
      class="open-workspace-btn flex items-center gap-2 px-6 py-2.5 bg-accent text-bg-base border-none rounded text-sm font-semibold cursor-pointer transition-opacity duration-150 ease-out hover:opacity-90 disabled:opacity-60 disabled:cursor-not-allowed"
      (click)="openWorkspace()"
      [disabled]="isOpeningValue"
    >
      @if (isOpeningValue) {
        <span class="w-3.5 h-3.5 border-2 border-bg-base/30 border-t-bg-base rounded-full animate-spin"></span>
        <span>Opening...</span>
      } @else {
        <span>📁</span>
        <span>Open Workspace</span>
      }
    </button>

    @if (recentWorkspacesList.length > 0) {
      <div class="w-full text-left">
        <h2 class="text-xs font-semibold text-text-muted uppercase tracking-[0.08em] m-0 mb-2.5">Recent Workspaces</h2>
        <ul class="list-none m-0 p-0 flex flex-col gap-0.5" data-testid="recent-workspaces-list">
          @for (path of recentWorkspacesList; track path) {
            <li class="recent-item flex items-center gap-2 px-3 py-2 rounded cursor-pointer transition-colors duration-100 ease-out hover:bg-white/5" (click)="openRecentWorkspace(path)" [attr.data-testid]="'recent-workspace-' + path.split('/').pop()">
              <span class="recent-icon text-sm shrink-0">📂</span>
              <span class="recent-path text-[13px] text-text-secondary overflow-hidden text-ellipsis whitespace-nowrap font-mono" [title]="path">{{ path }}</span>
            </li>
          }
        </ul>
      </div>
    }
  </div>
</div>
