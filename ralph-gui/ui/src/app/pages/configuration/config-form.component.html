<form [formGroup]="form" (ngSubmit)="handleSave()" class="config-form">
  <mat-accordion>
    <mat-expansion-panel [expanded]="true">
      <mat-expansion-panel-header>
        <mat-panel-title>General</mat-panel-title>
        <mat-panel-description>Verbosity, iterations, reviews</mat-panel-description>
      </mat-expansion-panel-header>
      
      <div class="form-section">
        <div class="form-row">
          <mat-form-field appearance="outline" class="form-field">
            <mat-label>Verbosity</mat-label>
            <input matInput type="number" formControlName="verbosity" min="0" max="3" matTooltip="Log verbosity level (0-3)">
            <mat-hint>0 = quiet, 3 = verbose</mat-hint>
          </mat-form-field>
        </div>
        
        <div class="form-row">
          <mat-form-field appearance="outline" class="form-field">
            <mat-label>Developer Iterations</mat-label>
            <input matInput type="number" formControlName="developer_iters" min="1" matTooltip="Max iterations for developer agent">
          </mat-form-field>
        </div>
        
        <div class="form-row">
          <mat-form-field appearance="outline" class="form-field">
            <mat-label>Reviewer Reviews</mat-label>
            <input matInput type="number" formControlName="reviewer_reviews" min="1" matTooltip="Number of reviews per cycle">
          </mat-form-field>
        </div>
        
        <div class="form-row">
          <mat-form-field appearance="outline" class="form-field">
            <mat-label>Review Depth</mat-label>
            <mat-select formControlName="review_depth" matTooltip="Depth of code review">
              <mat-option value="shallow">Shallow</mat-option>
              <mat-option value="medium">Medium</mat-option>
              <mat-option value="deep">Deep</mat-option>
            </mat-select>
          </mat-form-field>
        </div>
      </div>
    </mat-expansion-panel>
    
    <mat-expansion-panel [expanded]="true">
      <mat-expansion-panel-header>
        <mat-panel-title>Execution</mat-panel-title>
        <mat-panel-description>Checkpoint, isolation, interactive</mat-panel-description>
      </mat-expansion-panel-header>
      
      <div class="form-section">
        <div class="form-row toggle-row">
          <mat-slide-toggle formControlName="checkpoint_enabled" matTooltip="Enable checkpoint support">
            Checkpoint Enabled
          </mat-slide-toggle>
        </div>
        
        <div class="form-row toggle-row">
          <mat-slide-toggle formControlName="isolation_mode" matTooltip="Run agents in isolated environment">
            Isolation Mode
          </mat-slide-toggle>
        </div>
        
        <div class="form-row toggle-row">
          <mat-slide-toggle formControlName="interactive" matTooltip="Enable interactive mode">
            Interactive Mode
          </mat-slide-toggle>
        </div>
      </div>
    </mat-expansion-panel>
  </mat-accordion>
  
  <div class="form-actions">
    @if (saveMsg()) {
      <span class="save-message">{{ saveMsg() }}</span>
    }
    <button
      mat-raised-button
      color="primary"
      type="submit"
      [disabled]="form.invalid || saving()"
    >
      @if (saving()) {
        Saving...
      } @else {
        Save
      }
    </button>
  </div>
</form>
