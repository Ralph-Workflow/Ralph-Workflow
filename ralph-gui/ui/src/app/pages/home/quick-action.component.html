<button
  class="flex items-start gap-3 p-3.5 rounded-md bg-bg-surface border border-border-subtle text-left w-full transition-colors duration-fast hover:border-border-default hover:bg-bg-raised cursor-pointer"
  (click)="action.emit()"
>
  <span class="text-base text-accent/90 shrink-0 mt-0.5">
    {{ iconValue }}
  </span>
  <div>
    <div class="text-sm font-medium text-text-primary mb-0.5">
      {{ labelValue }}
    </div>
    <div class="text-xs text-text-muted leading-relaxed">
      {{ descValue }}
    </div>
  </div>
</button>
