<div [class]="containerClassesValue">
  <div [class]="valueClassesValue">
    {{ valueValue }}
  </div>
  @if (subtitleValue) {
    <div class="text-sm text-text-secondary font-ui mb-1">
      {{ subtitleValue }}
    </div>
  }
  <div class="text-xs text-text-muted font-ui uppercase tracking-wider flex items-center gap-1.5">
    {{ labelValue }}
    @if (hasTrendValue) {
      <span class="flex items-center gap-0.5" [class]="trendColorValue">
        <span>{{ trendIconValue }}</span>
        @if (trendLabelValue) {
          <span class="normal-case font-sans">{{ trendLabelValue }}</span>
        }
      </span>
    }
  </div>
</div>
