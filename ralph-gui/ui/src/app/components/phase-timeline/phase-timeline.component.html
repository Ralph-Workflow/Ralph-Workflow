<div class="phase-timeline">
  @for (item of currentDisplayPhases; track item.phase.name; let idx = $index; let last = $last) {
    <div
      class="phase-timeline__item"
      [class.phase-timeline__item--clickable]="item.phase.status === 'completed'"
      [attr.data-testid]="'phase-node'"
      [attr.data-status]="item.phase.status"
      (click)="onPhaseClick(item.phase)"
      [attr.role]="item.phase.status === 'completed' ? 'button' : null"
      [attr.tabindex]="item.phase.status === 'completed' ? '0' : null"
      [attr.aria-label]="item.phase.status === 'completed' ? 'View ' + item.phase.name + ' phase details' : null"
      (keydown.enter)="onPhaseClick(item.phase)"
    >
      <div class="phase-timeline__node">
        <div
          class="phase-timeline__dot"
          [class.animate-pulse]="item.phase.status === 'active'"
          [attr.data-testid]="item.dotTestId"
          [style]="item.dotStyle"
        >{{ item.dotSymbol }}</div>
        <div class="phase-timeline__label" [style]="item.labelStyle">
          {{ item.phase.name }}
        </div>
        @if (item.phase.duration) {
          <div
            class="phase-timeline__duration"
            data-testid="phase-duration"
          >
            {{ item.phase.duration }}
          </div>
        }
      </div>
      @if (!last) {
        <div
          class="phase-timeline__connector"
          [class.phase-timeline__connector--done]="item.phase.status === 'completed'"
          [class.phase-timeline__connector--active]="item.phase.status === 'active'"
        ></div>
      }
    </div>
  }
</div>
