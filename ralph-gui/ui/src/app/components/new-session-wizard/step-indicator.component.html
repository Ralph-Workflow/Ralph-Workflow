<div style="display: flex; align-items: center; gap: 0; margin-bottom: 20px;">
  @for (s of stepViewModels; track s.id; let idx = $index) {
    <div style="display: flex; align-items: center; flex: idx < stepViewModels.length - 1 ? 1 : undefined;">
      <div style="display: flex; align-items: center; gap: 6px;">
        <div [style]="s.stepStyle">
          @if (s.done) {
            ✓
          } @else {
            {{ idx + 1 }}
          }
        </div>
        <span [style]="s.labelStyle">
          {{ s.label }}
        </span>
      </div>
      @if (idx < stepViewModels.length - 1) {
        <div [style]="s.lineStyle"></div>
      }
    </div>
  }
</div>
