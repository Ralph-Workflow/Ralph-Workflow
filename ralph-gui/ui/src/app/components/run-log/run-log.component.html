<div class="run-log-wrapper">
  <div class="run-log-toolbar">
    <div class="run-log-toolbar__left">
      <input
        class="input input-mono run-log-search"
        type="text"
        placeholder="Search logs…"
        [value]="currentSearchTerm"
        (input)="searchTerm.set($any($event.target).value)"
        aria-label="Search log lines"
      />
    </div>
    <div class="run-log-toolbar__right">
      @if (!isAutoScrollEnabled) {
        <button
          class="btn btn-ghost run-log-btn"
          data-testid="resume-autoscroll"
          (click)="setAutoScroll(true)"
        >
          ↓ Resume auto-scroll
        </button>
      }
      <button
        class="btn btn-ghost run-log-btn"
        (click)="downloadLogs()"
        [disabled]="currentLogLines.length === 0"
        title="Download full log"
        aria-label="Download full log as text file"
      >
        ↓ Download
      </button>
    </div>
  </div>

  @if (currentLogLines.length === 0) {
    <div
      data-testid="run-log-empty"
      class="run-log-empty"
    >
      No log output yet.
    </div>
  } @else if (currentFilteredLines.length === 0 && currentSearchTerm) {
    <div class="run-log-empty">No lines match "{{ currentSearchTerm }}"</div>
  } @else {
    <cdk-virtual-scroll-viewport
      #viewport
      [itemSize]="itemSize"
      class="run-log-viewport"
      role="log"
      aria-live="polite"
      aria-label="Run log output"
      data-testid="run-log-content"
      (scrolledIndexChange)="onScrolledIndexChange($event)"
    >
      @for (line of currentParsedLines; track $index) {
        <div class="run-log-line" [innerHTML]="line"></div>
      }
    </cdk-virtual-scroll-viewport>
  }
</div>
