# ============================================================================
# Package-local clippy configuration for ralph-workflow.
# Keep lint policy strict while configuring thresholds for structural lints.
# Deliberate policy decision: unit-test modules and the generated lib-test
# harness can exceed `clippy::large_stack_frames`, so keep the lint active for
# production code while allowing it in `#[test]` and `#[cfg(test)]` code.
allow-large-stack-frames-in-tests = true

too-many-lines-threshold = 500
max-struct-bools = 32
array-size-threshold = 65536
