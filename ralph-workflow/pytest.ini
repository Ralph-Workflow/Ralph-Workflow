[pytest]
minversion = 8.0
testpaths = tests
asyncio_mode = auto
# Smoke tests are EXCLUDED by default — even when running ``pytest`` with no
# arguments. This is policy: smoke tests are one-off manual debug harnesses
# for a SPECIFIC agent issue; they MUST NOT run in any suite. To run one
# explicitly: ``pytest path/to/test_smoke_X.py -m smoke`` or pass
# ``-m smoke`` (which overrides the addopts).
addopts =
    -m "not smoke"
markers =
    timeout_seconds(value): override the per-test timeout for slower integration cases
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    subprocess_e2e: marks tests that require real subprocesses or network sockets (excluded from timed test-cov; run via test-subprocess-e2e)
    smoke: ONE-OFF manual smoke tests for debugging a SPECIFIC agent issue. NEVER run by any ``make test*`` target — invoke the file or test name directly when you need it. Marked smoke tests must be excluded from every test suite. Excluded by default via ``addopts``.
filterwarnings =
    error
    ignore::pytest.PytestUnraisableExceptionWarning
    ignore::DeprecationWarning
