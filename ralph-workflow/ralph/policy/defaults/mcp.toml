# Bundled default MCP configuration for Ralph Workflow.
#
# Ralph Workflow manages a standard eight-file first-run config set:
#   1. ~/.config/ralph-workflow.toml          (user-global main config)
#   2. ~/.config/ralph-workflow-mcp.toml      (user-global MCP config, this file)
#   3. ~/.config/ralph-workflow-pipeline.toml (user-global pipeline defaults)
#   4. ~/.config/ralph-workflow-artifacts.toml (user-global artifact defaults)
#   5. .agent/ralph-workflow.toml             (project-local override)
#   6. .agent/mcp.toml                        (project-local MCP override)
#   7. .agent/pipeline.toml                   (project-local pipeline phases)
#   8. .agent/artifacts.toml                  (project-local artifact contracts)
#
# OVERRIDE PRECEDENCE (highest to lowest):
#   CLI flags > project-local (.agent/) > user-global (~/.config/) > bundled defaults
#
# REGENERATION: Run `ralph --regenerate-config` to refresh all configs from
# bundled defaults. Existing files are backed up to <name>.bak before overwrite.
#
# This file ships inside the wheel as the built-in default.
# Create `.agent/mcp.toml` (project-local) or `~/.config/ralph-workflow-mcp.toml`
# (user-global) to override it.
#
# ============================================================
# OPTIONAL — everything below this line has a working default.
# Skip this file entirely unless you know you need it.
# ============================================================
# Edit this only if you are adding an MCP server, web-search backend, or media setting.
# IMPORTANT:
# - Keep this file secret-free.
# - Prefer `api_key_env` over inline secrets.
# - All example blocks below are commented out and fenced for safe auto-uncommenting.

# Edit this only if you are adding an MCP server.
# @EXAMPLE-START
# [mcp_servers.github]
# transport = "stdio"
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-github"]
#
# [mcp_servers.github.env]
# GITHUB_TOKEN = "$GITHUB_TOKEN"
# @EXAMPLE-END

# @EXAMPLE-START
# [mcp_servers.docs]
# transport = "http"
# url = "https://mcp.example.com/docs"
# @EXAMPLE-END

# Angular CLI MCP integration (stdio).
# See https://angular.dev/tools/mcp for the current package name and setup.
# Replace "<angular-mcp-package>" with the published package once it is available.
# @EXAMPLE-START
# [mcp_servers.angular-cli]
# transport = "stdio"
# command = "npx"
# args = ["-y", "@angular/mcp"]
# @EXAMPLE-END

# Docs MCP server running locally (arabold/docs-mcp-server).
# Start with: npx -y docs-mcp-server  (listens on port 6280 by default).
# See https://github.com/arabold/docs-mcp-server for setup instructions.
# Ralph Workflow supports both the modern streamable HTTP endpoint (`/mcp`) and the
# legacy SSE endpoint (`/sse`) used by some clients such as OpenCode configs.
# Prefer `/mcp` when you control the config; `/sse` is supported for
# compatibility.
# @EXAMPLE-START
# [mcp_servers.docs-mcp]
# transport = "http"
# url = "http://localhost:6280/mcp"
# @EXAMPLE-END
#
# Legacy-compatible alternative:
# url = "http://localhost:6280/sse"

# Edit this only if you are changing web search.
# @EXAMPLE-START
# [web_search]
# enabled = true
# backend = "ddgs"
# fallback = ["searxng", "tavily", "brave", "exa"]
# @EXAMPLE-END

# @EXAMPLE-START
# [web_search.backends.ddgs]
# # ddgs is the default in-process backend.
# # No configuration is required.
# @EXAMPLE-END

# @EXAMPLE-START
# [web_search.backends.tavily]
# # Prefer env vars; inline secrets here would be committed if uncommented.
# api_key_env = "TAVILY_API_KEY"
# # api_key = "DO_NOT_COMMIT_INLINE_SECRETS"
# @EXAMPLE-END

# @EXAMPLE-START
# [web_search.backends.searxng]
# url = "https://search.example.com"
# @EXAMPLE-END

# Edit this only if you want Ralph Workflow to fetch web pages.
# Built-in URL fetcher that returns readable text from a single page.
# Requires the optional extras: pip install "ralph-workflow[web-visit]"
# @EXAMPLE-START
# [web_visit]
# enabled = true
# timeout_ms = 15000
# max_bytes = 2097152
# user_agent = "RalphWorkflow/1.0 (+https://ralph-workflow.dev)"
# allow_private_networks = false
# extract_links = false
# @EXAMPLE-END

# Edit this only if you need to customize media handling.
# Broad multimodal support (read_media tool; read_image is a compatibility alias for inline images).
# Covers images, PDFs, audio, video, and office documents.
# ENABLED BY DEFAULT - no config required for basic use.
# To disable or customize:
# @EXAMPLE-START
# [media]
# enabled = false  # set to false to opt out
# max_inline_bytes = 5242880  # 5 MiB default; increase for larger inline images
# @EXAMPLE-END

# Edit this only if your runtime needs task tooling as an MCP server.
# Task MCP server (only when the runtime lacks built-in task tooling).
# Many AI agent runtimes (Claude Code, OpenCode, Codex, AGY, etc.) ship a
# built-in sub-agent / task tool that already supports parallel plan
# execution. For supported agents, the agent's native sub-agent / task
# tooling is enabled by default via `[agents.<name>] subagent_capability`
# in `ralph-workflow.toml` and NO MCP-server config is needed.
# This example block is only for runtimes that expose their task tooling
# as a separate MCP server (rare; e.g. legacy third-party runtimes that
# do not advertise a built-in task tool). Most users can ignore it;
# parallel execution is delegated to the agent's native tooling.
# @EXAMPLE-START
# [mcp_servers.task]
# transport = "stdio"
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-task"]
# @EXAMPLE-END

# Edit this only if you need advanced web crawling.
# Crawl4AI upstream MCP server for advanced web crawling (multi-page, JS-rendered).
# Install and start: pip install crawl4ai && crawl4ai-mcp  (default port 11235)
# See https://docs.crawl4ai.com/mcp/server/ for full setup and security notes.
# @EXAMPLE-START
# [mcp_servers.crawl4ai]
# transport = "http"
# url = "http://localhost:11235/mcp"
# @EXAMPLE-END
