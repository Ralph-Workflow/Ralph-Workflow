# User-global Ralph Workflow configuration.
#
# Ralph Workflow manages a standard eight-file first-run config set:
#   1. ~/.config/ralph-workflow.toml          (user-global main config, this file)
#   2. ~/.config/ralph-workflow-mcp.toml      (user-global MCP config)
#   3. ~/.config/ralph-workflow-pipeline.toml (user-global pipeline defaults)
#   4. ~/.config/ralph-workflow-artifacts.toml (user-global artifact defaults)
#   5. .agent/ralph-workflow.toml             (project-local override)
#   6. .agent/mcp.toml                        (project-local MCP override)
#   7. .agent/pipeline.toml                   (project-local pipeline phases)
#   8. .agent/artifacts.toml                  (project-local artifact contracts)
#
# OVERRIDE PRECEDENCE (highest to lowest):
#   CLI flags > project-local (.agent/) > user-global (~/.config/) > bundled defaults
#
# REGENERATION: Run `ralph --regenerate-config` to refresh all configs from
# bundled defaults. Existing files are backed up to <name>.bak before overwrite.
#
# Location: ~/.config/ralph-workflow.toml  (or $XDG_CONFIG_HOME/ralph-workflow.toml)
#
# Project-local overrides live in .agent/ralph-workflow.toml — values there
# take precedence over this file.
#
# Every non-secret field is listed below with its default value, commented out.
# Uncomment and edit only the fields you want to change; everything else keeps
# its documented default automatically.
#
# For MCP servers and web search, edit ~/.config/ralph-workflow-mcp.toml
# (or .agent/mcp.toml for project-local overrides).

# ---------------------------------------------------------------------------
# [general] — Core workflow settings
# ---------------------------------------------------------------------------
[general]
# verbosity = 2                         # 0=quiet 1=normal 2=verbose 3=full 4=debug
# telemetry_enabled = true              # anonymous metadata-only telemetry is on by default. Set false to opt out. Ralph Workflow uses this data only to improve reliability/product quality, understand active usage and feature adoption, and inform users about useful capabilities. It is never sold, rented, or shared for advertising.
# Loop iteration caps live in pipeline.toml [loop_counters.*] (see ralph --explain-policy).
# Override budget caps with: ralph --counter <name>=<value> (e.g. --counter iteration=8).
# developer_context = 1                 # developer context level (>=1)
# prompt_path = "/path/to/PROMPT.md"    # override default PROMPT.md path (comment out to use default)
# templates_dir = "/path/to/templates"  # user templates directory (comment out to use bundled)
# git_user_name = "Your Name"           # git author name for commits (comment out to use git config)
# git_user_email = "you@example.com"    # git author email for commits (comment out to use git config)
# max_same_agent_retries = 10           # max consecutive retries on the same agent (>=0)
# max_commit_residual_retries = 10      # max extra residual commit retries (>=0)
# max_retries = 3                       # max retries per agent attempt (>=0)
# retry_delay_ms = 1000                 # base delay between retries in ms (>=0)
# backoff_multiplier = 2.0              # exponential backoff multiplier (>=1.0)
# max_backoff_ms = 60000                # maximum retry backoff delay in ms (>=0)
# max_cycles = 3                        # max full fallback cycles through a drain (>=1)
# execution_history_limit = 1000        # max execution history entries in memory (>=1)
# agent_idle_timeout_seconds = 300.0    # max idle seconds before killing a stalled agent process (>0)
# agent_idle_max_waiting_on_child_seconds = 1800.0  # hard ceiling on cumulative WAITING_ON_CHILD deferral (>0)
# agent_waiting_status_interval_seconds = 30.0      # periodic status emission cadence while WAITING_ON_CHILD (>0)
# agent_suspect_waiting_on_child_seconds = 600.0    # suspicion threshold; emits a warning but does not stop the run (<max_waiting_on_child_seconds)
# agent_idle_no_progress_waiting_on_child_seconds = 600.0  # no-progress ceiling; fires when child alive but not making progress (<=max_waiting_on_child_seconds)
# agent_os_descendant_only_ceiling_seconds = 120.0  # short ceiling (~120s) for OS-descendant-only case; fires CHILDREN_PERSIST_TOO_LONG in ~120s instead of waiting for the no-progress ceiling. None disables.
# agent_no_progress_quiet_minimum_invocation_seconds = 120.0  # dumb-kill floor for NO_PROGRESS_QUIET: the watchdog cannot fire this reason within the first N seconds of an agent run, so a recently-launched agent doing real thinking work (planning, exploration, dispatching subagents) but with no first-party evidence yet is not killed. Must be > 0 when set; 0 is rejected. None disables (not recommended). SESSION_CEILING_EXCEEDED is unaffected.
# agent_os_descendant_only_suspect_seconds = 60.0   # earlier SUSPECTED_FROZEN (~60s) for OS-descendant-only case; fires at min(suspect, this value). None disables.
# agent_cpu_idle_seconds = 60.0                     # CPU idle probe: known descendant with 0 CPU for this long is reported as CPU_IDLE_WHILE_ALIVE. None disables.
# agent_log_growth_seconds = 30.0                  # log-growth probe: per-run .agent/raw/{safe_id}.log not grown for this long is reported as LOG_STALE_WHILE_ALIVE. None disables.
# agent_idle_activity_evidence_ttl_seconds = 30.0   # per-channel activity TTL; defers NO_OUTPUT_DEADLINE while MCP tool calls, subagent work, or workspace events are fresher than this TTL. Workspace evidence is collected whenever a run has a workspace_path, even when show_progress is disabled. A subagent that is alive but silent on every channel is NOT treated as activity. Set to 0.0 to disable and restore legacy stdout-only behavior. (>=0)
# agent_workspace_change_weights = { source = 1.0, log = 0.0, cache = 0.0, artifact = 0.0, other = 0.0 }   # per-kind workspace file-change weights; values are BINARY (0.0 = drop, 1.0 = full activity). The default is conservative: only source-code changes count. Operators who relied on log-file activity to defer the verdict can opt in by setting `agent_workspace_change_weights = { log = 1.0, source = 1.0 }`. The five keys are: source (source code / documentation), log (*.log / *.tmp / *.bak / *.swp / *~ / *.pyc / *.pyo), cache (.git / __pycache__ / .pytest_cache / .mypy_cache / .ruff_cache / node_modules / .venv / .agent/tmp / .agent/raw / completion_seen_*.json), artifact (.agent/artifacts), and other (anything else). See docs/agents/timeout-policy.md for the full migration note.
# auto_integrate_enabled = true          # enable auto-integration of feature branches with the local mainline. When true (default), every commit phase that actually creates a commit is followed by a rebase onto the shared mainline (with an endpoint-merge fallback on conflict) and a fast-forward of the mainline ref to the feature tip. The step is a no-op in single-branch workflows via the existing skip conditions (on-target, no-commits-beyond-target, detached HEAD, missing target branch). Set to false to keep git behavior byte-identical to runs without auto-integration -- useful when an operator manages integration manually.
# auto_integrate_target = "develop"      # shared integration branch name. When set (e.g. "develop") it is used verbatim ONLY if the branch exists in the repository. When unset (default), the target is auto-detected: the remote's default branch (origin/HEAD) when a remote exists, otherwise "main", otherwise "master". If no candidate resolves to an existing branch the step skips with a recorded reason -- it never guesses a branch that is not clearly the shared mainline.
# auto_integrate_fetch_enabled = true    # when true (default), the auto-integration step runs a bounded, read-only "git fetch origin <target>" before each attempt and fast-forwards the local mainline ref when the remote-tracking ref is strictly ahead. Never force-moves a ref and never pushes. Set to false to keep the step strictly local -- appropriate when every agent shares one git common directory through linked worktrees, where the mainline ref is already shared.
# auto_integrate_fetch_timeout_seconds = 10.0  # wall-clock budget for the auto-integration fetch. On timeout or any remote failure the step degrades silently to local-only integration; the run is never failed by an unreachable remote.
# agent_process_monitor_enabled = true              # enable the agent-agnostic process monitor that discovers and classifies spawned subagents
# agent_subagent_output_capture_enabled = true      # enable polling of observable subagent output streams as first-party evidence
# agent_subagent_output_poll_interval_seconds = 1.0 # poll interval for subagent output streams (>0)

# [general.provider_fallback] — Provider/model fallbacks keyed by agent name
# Uncomment and list agents as keys; each value is an ordered list of fallback models/providers
# Example: { claude = ["claude-sonnet-4-20250514", "claude-3-5-sonnet-20241022"] }
# provider_fallback = {}

# [general.workflow] — Workflow automation flags
[general.workflow]
# checkpoint_enabled = true     # enable checkpoint/resume functionality
# unsafe_mode = false          # merge Ralph Workflow MCP into agent MCP config instead of overwriting it

# ---------------------------------------------------------------------------
# [ccs] — Claude Code Switch (CCS) headless-Claude defaults.
# CCS is the explicitly-headless Claude path. Configure [ccs_aliases] to run
# Claude non-interactively (--print --output-format=stream-json). For unattended
# interactive Claude use the built-in "claude" or "claude/MODEL" agents instead.
# ---------------------------------------------------------------------------
[ccs]
# output_flag = "--output-format=stream-json"
# yolo_flag = "--permission-mode auto"
# verbose_flag = "--verbose"
# print_flag = "--print"
# streaming_flag = "--include-partial-messages"
# json_parser = "claude"
# session_flag = "--resume {}"
# can_commit = true

# ---------------------------------------------------------------------------
# [ccs_aliases] — CCS alias mappings (string or table form)
# ---------------------------------------------------------------------------
# Simple string form (uses built-in defaults for the named alias):
# ccs_aliases = { claude = "claude", opencode = "opencode" }
#
# Table form (override per-alias CCS settings):
# [ccs_aliases.claude]
# cmd = "claude"
# model_flag = "--model claude-sonnet-4"
# can_commit = true
#
# [ccs_aliases.opencode]
# cmd = "opencode"
# model_flag = "--model opencode-o3"
# can_commit = false

# ---------------------------------------------------------------------------
# [agents.*] — Agent definitions
# Uncomment and adjust to add or override agents.
# ---------------------------------------------------------------------------

# [agents.claude]
# cmd = "claude"
# transport = "claude_interactive"
# Use skip-permissions here because Ralph Workflow confines interactive Claude
# through the Ralph Workflow MCP/tool allowlist; MCP remains the real
# permission boundary.
# yolo_flag = "--dangerously-skip-permissions"
# verbose_flag = "--verbose"
# json_parser = "claude"
# session_flag = "--resume {}"
# can_commit = true
# display_name = "Claude"

[agents.claude]
cmd = "claude"
transport = "claude_interactive"
# Use skip-permissions here because Ralph Workflow confines interactive Claude
# through the Ralph Workflow MCP/tool allowlist; MCP remains the real
# permission boundary.
yolo_flag = "--dangerously-skip-permissions"
verbose_flag = "--verbose"
json_parser = "claude"
session_flag = "--resume {}"
can_commit = true
display_name = "Claude"
# Claude Code's native sub-agent / task tooling is enabled by default in
# this build. Plans that declare work_units / parallel_plan are
# dispatched to the executing agent's sub-agents; Ralph-managed fan-out
# stays dormant. Set to false to force sequential execution.
subagent_capability = true

# [agents.opencode]
# cmd = "opencode"
# output_flag = "--output-format=stream-json"
# yolo_flag = "-y"
# json_parser = "opencode"
# can_commit = false
# display_name = "OpenCode"

# [agents.nanocoder]
# cmd = "nanocoder"
# transport = "nanocoder"
# json_parser = "generic"
# can_commit = false
# display_name = "Nanocoder"

# [agents.agy]
# cmd = "agy"
# transport = "agy"
# yolo_flag = "--dangerously-skip-permissions"
# print_flag = "--print"
# json_parser = "generic"
# can_commit = false
# display_name = "Google Anti Gravity"

# [agents.prompt-helper-agent]
# cmd = "claude"
# transport = "claude_interactive"
# yolo_flag = "--dangerously-skip-permissions"
# verbose_flag = "--verbose"
# json_parser = "claude"
# session_flag = "--resume {}"
# can_commit = false

# [agents.pi]
# Pi.dev minimal coding-agent harness (https://pi.dev/). Install via either:
#   npm install -g @earendil-works/pi-coding-agent     # https://www.npmjs.com/package/@earendil-works/pi-coding-agent
#   curl -fsSL https://pi.dev/install.sh | sh           # https://pi.dev/ (official install script)
# Pi streams NDJSON events on stdout per https://pi.dev/docs/latest/json
# and has no native MCP config file; Ralph Workflow wires MCP through a
# generated Pi extension and retries clean exits without completion evidence
# against the captured Pi session.
# cmd = "pi"
# output_flag = "--mode json"
# yolo_flag = "--approve"
# json_parser = "pi"
# session_flag = "--session {}"
# can_commit = true
# display_name = "Pi"

# ---------------------------------------------------------------------------
# [agent_chains.*] — Named reusable chain definitions (list of agent names)
# The active defaults below are the recommended starting point. They showcase
# explicit model families and ordered fallback across Claude, OpenCode, Codex, Nanocoder, and Google Anti Gravity (agy).
# ---------------------------------------------------------------------------

[agent_chains]
planning = ["claude/opus"]
development = [
  "opencode/minimax/MiniMax-M2.7-highspeed",
  "codex",
  "claude/sonnet",
]
analysis = ["opencode/openai/gpt-5.4"]
commit = ["claude/haiku"]

# CCS alternative example: planning = ["ccs/work"]
# See docs/sphinx/configuration.md#ccs_aliases for CCS details.

# ---------------------------------------------------------------------------
# [agent_drains.*] — Drain-to-chain bindings for pipeline drains
# Maps each pipeline drain name to a chain name defined in [agent_chains].
# IMPORTANT: the bundled pipeline uses the drain set below.
# ---------------------------------------------------------------------------

[agent_drains]
planning = "planning"
planning_analysis = "analysis"
development = "development"
development_analysis = "analysis"
development_commit = "commit"
analysis = "analysis"
commit = "commit"

# [prompt_helper]
# Omit agent = to use the first configured agent in [agents.*]; if no agents are
# configured, Ralph Workflow falls back to the built-in "opencode" agent.
# Uncomment and set agent = to force a specific agent instead:
# agent = "claude"
