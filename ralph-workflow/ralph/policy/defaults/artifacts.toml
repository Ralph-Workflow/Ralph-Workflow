# Default artifacts policy for Ralph.
#
# PURPOSE: Defines MCP artifact contracts for each drain.
#
# LOCATION: This file is the canonical default. Ralph reads overrides from:
#   - .agent/artifacts.toml (project-local, takes precedence over this file)
#
# REGENERATION: Run `ralph --regenerate-config` to refresh from this default.
#
# MINIMUM REQUIRED SECTIONS: [artifacts] must be present.
#
# MCP-artifact-only: Unlike the legacy Rust implementation, the Python Ralph
# does not support XML/XSD structured output. All agent output flows through
# typed JSON artifacts submitted via the MCP bridge.
#
# decision_vocabulary defines valid values for analysis decision routing:
# - "continue" / "success" / "completed" / "approve" / "approved" → on_success transition
# - "loopback" / "retry" / "request_changes" → on_loopback transition
# - "fail" / "failed" / "reject" → on_failure transition

# ---------------------------------------------------------------------------
# Planning artifact
# ---------------------------------------------------------------------------

[artifacts.planning_output]
drain = "planning"
artifact_type = "plan"
decision_vocabulary = []
prompt_template = "planning.jinja"

[artifacts.development_output]
drain = "development"
artifact_type = "development_result"
decision_vocabulary = []
prompt_template = "developer_iteration.jinja"

[artifacts.review_output]
drain = "review"
artifact_type = "issues"
decision_vocabulary = []
prompt_template = "review.jinja"

[artifacts.fix_output]
drain = "fix"
artifact_type = "fix_result"
decision_vocabulary = []
prompt_template = "fix_mode.jinja"

# ---------------------------------------------------------------------------
# Development analysis decision
# ---------------------------------------------------------------------------

[artifacts.development_analysis_decision]
drain = "development_analysis"
artifact_type = "development_analysis_decision"
decision_vocabulary = [
    "continue",
    "success",
    "completed",
    "loopback",
    "retry",
    "request_changes",
    "fail",
    "failed",
]
prompt_template = "development_analysis.jinja"

# ---------------------------------------------------------------------------
# Review analysis decision
# ---------------------------------------------------------------------------

[artifacts.review_analysis_decision]
drain = "review_analysis"
artifact_type = "review_analysis_decision"
decision_vocabulary = [
    "approve",
    "approved",
    "completed",
    "request_changes",
    "reject",
    "loopback",
]
prompt_template = "review_analysis.jinja"

# ---------------------------------------------------------------------------
# Development commit artifact
# ---------------------------------------------------------------------------

[artifacts.development_commit_artifact]
drain = "development_commit"
artifact_type = "commit_message"
decision_vocabulary = []
prompt_template = "development_commit_message.jinja"

# ---------------------------------------------------------------------------
# Review commit artifact
# ---------------------------------------------------------------------------

[artifacts.review_commit_artifact]
drain = "review_commit"
artifact_type = "commit_message"
decision_vocabulary = []
prompt_template = "commit_message.jinja"
