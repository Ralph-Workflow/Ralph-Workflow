# Default artifacts policy for Ralph Workflow.
#
# PURPOSE: Defines MCP artifact contracts for each drain.
#
# LOCATION: This file is the canonical default. Ralph Workflow reads overrides from:
#   - .agent/artifacts.toml (project-local, takes precedence over this file)
#
# REGENERATION: Run `ralph --regenerate-config` to refresh from this default.
#
# ============================================================
# OPTIONAL — everything below this line has a working default.
# Skip this file entirely unless you know you need it.
# ============================================================
# Edit this only if you are changing an artifact contract.
#
# MCP-artifact-only: Unlike the legacy Rust implementation, the Python Ralph Workflow
# does not support XML/XSD structured output. All agent output flows through
# typed JSON artifacts submitted via the MCP bridge.
#
# decision_vocabulary defines the allowed analysis decision strings for each artifact.
# Their routing is policy-owned in pipeline.toml via phases.<name>.decisions, not implied
# by the vocabulary text itself. For the default workflow, both "request_changes" and
# "failed" are remediation outcomes, while "completed" advances forward.

# ---------------------------------------------------------------------------
# Edit this only if you are changing planning or development artifacts.
# Planning artifact
# ---------------------------------------------------------------------------

[artifacts.planning_output]
drain = "planning"
artifact_type = "plan"
decision_vocabulary = []
prompt_template = "planning.jinja"
markdown_summary_path = ".agent/PLAN.md"

[artifacts.development_output]
drain = "development"
artifact_type = "development_result"
decision_vocabulary = []
prompt_template = "developer_iteration.jinja"
markdown_summary_path = ".agent/DEVELOPMENT_RESULT.md"

# ---------------------------------------------------------------------------
# Edit this only if you are changing the development-analysis decision artifact.
# Development analysis decision
# ---------------------------------------------------------------------------

[artifacts.development_analysis_decision]
drain = "development_analysis"
artifact_type = "development_analysis_decision"
decision_vocabulary = [
    "completed",
    "request_changes",
    "failed",
]
prompt_template = "development_analysis.jinja"
markdown_summary_path = ".agent/DEVELOPMENT_ANALYSIS_DECISION.md"

# ---------------------------------------------------------------------------
# Edit this only if you are changing the planning-analysis decision artifact.
# Planning analysis decision
# ---------------------------------------------------------------------------

[artifacts.planning_analysis_decision]
drain = "planning_analysis"
artifact_type = "planning_analysis_decision"
decision_vocabulary = [
    "completed",
    "request_changes",
    "failed",
]
prompt_template = "planning_analysis.jinja"
markdown_summary_path = ".agent/PLANNING_ANALYSIS_DECISION.md"

# ---------------------------------------------------------------------------
# Edit this only if you are changing commit artifacts.
# Development commit artifact
# ---------------------------------------------------------------------------

[artifacts.development_commit_artifact]
drain = "development_commit"
artifact_type = "commit_message"
decision_vocabulary = []
prompt_template = "commit_message.jinja"
artifact_json_path = ".agent/tmp/commit_message.json"

[artifacts.development_commit_cleanup_artifact]
drain = "commit"
artifact_type = "commit_cleanup"
decision_vocabulary = []
prompt_template = "commit_cleanup.jinja"
artifact_json_path = ".agent/artifacts/commit_cleanup.json"

# ---------------------------------------------------------------------------
# Edit this only if you are changing the policy-remediation artifact.
# Policy-remediation analysis decision (out-of-graph)
# ---------------------------------------------------------------------------
#
# The decision surface of the hardcoded policy pipeline. Its drain is bound to
# no pipeline phase; the contract exists so the analysis agent has a real,
# schema-validated way to return its routing decision, and so the driver in
# ralph/project_policy/pipeline_driver.py can read that decision back from the
# artifact JSON -- exactly as ralph/phases/analysis.py does for the in-graph
# analysis phases.

[artifacts.policy_remediation_analysis_decision]
drain = "policy_remediation_analysis"
artifact_type = "policy_remediation_analysis_decision"
decision_vocabulary = [
    "completed",
    "request_changes",
    "failed",
]
prompt_template = "policy_remediation_analysis.jinja"
markdown_summary_path = ".agent/POLICY_REMEDIATION_ANALYSIS_DECISION.md"
