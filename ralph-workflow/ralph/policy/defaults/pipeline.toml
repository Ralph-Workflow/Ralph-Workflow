# Default pipeline policy for Ralph Workflow.
#
# This bundled default is authored as explicit blocks and compiled by the loader
# into the flat runtime phase graph used by reducer/checkpoint/display code.
# ============================================================
# OPTIONAL — everything below this line has a working default.
# Skip this file entirely unless you know you need it.
# ============================================================
# Edit this only if you are changing which checks or phases run in the pipeline.

entry_block = "developer_iteration"
terminal_phase = "complete"

# ---------------------------------------------------------------------------
# Edit this only if you need to tune how often a loop can run.
# Loop counters
# ---------------------------------------------------------------------------

# Raise this if development-analysis reviews keep looping past 10 passes before approving a change;
# lower it to fail fast on a weaker development agent instead of grinding through retries.
[loop_counters.development_analysis_iteration]
default_max = 10
description = "Development analysis loop iteration counter"

[loop_counters.planning_analysis_iteration]
# Raise above 0 only when a smaller planning model needs extra passes to self-correct;
# capable planners usually do not need it, and each pass costs more.
default_max = 0
description = "Planning analysis loop iteration counter"

# Raise this only if commit-cleanup (fixing lint/format issues before a commit) needs more than 3 self-correction passes;
# most agents fix cleanup issues in one or two passes.
[loop_counters.commit_cleanup_iteration]
default_max = 3
description = "Commit cleanup loop iteration counter"

# ---------------------------------------------------------------------------
# Edit this only if you need to change the total development-cycle budget.
# Budget counters
# ---------------------------------------------------------------------------

# This is the overall ceiling on full plan -> build -> commit cycles for one run.
# Raise it for a multi-day task that needs more passes; lower it to cap cost/time on a quick task.
[budget_counters.iteration]
description = "Development iteration counter (developer cycles)"
tracks_budget = true
default_max = 5

# ---------------------------------------------------------------------------
# Edit this only if you are changing the workflow phases or their order.
# Block-authored default workflow
# ---------------------------------------------------------------------------

[blocks.developer_iteration]
kind = "group"
child_blocks = [
  "planning",
  "planning_analysis",
  "development",
  "development_commit_cleanup",
  "development_commit",
  "development_analysis",
  "development_final_commit_cleanup",
  "development_final_commit",
  "complete",
  "failed_terminal",
]
completion_block = "development_final_commit"
before_complete = [
  "development_commit_cleanup",
  "development_commit",
  "development_final_commit_cleanup",
]
increments_counter = "iteration"
loop_resets = ["development_analysis_iteration", "commit_cleanup_iteration"]

[blocks.planning]
kind = "individual"
phase_name = "planning"
[blocks.planning.phase]
drain = "planning"
role = "execution"
prompt_template = "planning.jinja"
loopback_prompt_template = "planning_edit.jinja"
display_style = "theme.phase.planning"
clear_drains_on_fresh_entry = ["planning", "planning_analysis", "development_analysis"]
[blocks.planning.phase.transitions]
on_success = "planning_analysis"
[blocks.planning.phase.artifact_history]
enabled = true
clear_on_fresh_entry = true

[blocks.planning_analysis]
kind = "individual"
phase_name = "planning_analysis"
[blocks.planning_analysis.phase]
drain = "planning_analysis"
role = "analysis"
prompt_template = "planning_analysis.jinja"
[blocks.planning_analysis.phase.transitions]
on_success = "development"
on_loopback = "planning"
[blocks.planning_analysis.phase.artifact_history]
enabled = true
clear_on_fresh_entry = false
[blocks.planning_analysis.phase.loop_policy]
iteration_state_field = "planning_analysis_iteration"
[blocks.planning_analysis.phase.decisions.completed]
target = "development"
reset_loop = true
[blocks.planning_analysis.phase.decisions.request_changes]
target = "planning"
reset_loop = false
[blocks.planning_analysis.phase.decisions.failed]
target = "planning"
reset_loop = false

[blocks.development]
kind = "individual"
phase_name = "development"
[blocks.development.phase]
drain = "development"
role = "execution"
prompt_template = "developer_iteration.jinja"
continuation_template = "developer_iteration_continuation.jinja"
display_style = "theme.phase.development"
clear_drains_on_fresh_entry = ["planning_analysis", "development", "development_analysis"]
result_status_post_commit = { partial = "development" }
[blocks.development.phase.transitions]
on_success = "development_commit_cleanup"
on_loopback = "development"
[blocks.development.phase.artifact_history]
enabled = true
clear_on_fresh_entry = true
[blocks.development.phase.parallelization]
mode = "same_workspace"
dispatch_mode = "agent_subagents"
max_parallel_workers = 8
max_work_units = 50
require_allowed_directories = true
post_fanout_verification = false
[blocks.development.phase.artifact_proof_policy]
require_plan_proof = true
require_analysis_proof = true

[blocks.development_commit_cleanup]
kind = "individual"
phase_name = "development_commit_cleanup"
[blocks.development_commit_cleanup.phase]
drain = "commit"
role = "commit_cleanup"
prompt_template = "commit_cleanup.jinja"
display_style = "theme.phase.commit"
[blocks.development_commit_cleanup.phase.transitions]
on_success = "development_commit"
on_loopback = "development_commit_cleanup"
on_failure = "failed_terminal"
[blocks.development_commit_cleanup.phase.loop_policy]
iteration_state_field = "commit_cleanup_iteration"

[blocks.development_commit]
kind = "individual"
phase_name = "development_commit"
[blocks.development_commit.phase]
drain = "development_commit"
role = "commit"
prompt_template = "commit_message.jinja"
display_style = "theme.phase.development_commit"
clear_drains_on_fresh_entry = ["development", "development_analysis"]
[blocks.development_commit.phase.artifact_history]
enabled = true
clear_on_fresh_entry = false
[blocks.development_commit.phase.transitions]
on_success = "development_analysis"
on_failure = "failed_terminal"
[blocks.development_commit.phase.commit_policy]
requires_artifact = true
skipped_advances_progress = false
loop_resets = ["commit_cleanup_iteration"]

[blocks.development_analysis]
kind = "individual"
phase_name = "development_analysis"
[blocks.development_analysis.phase]
drain = "development_analysis"
role = "analysis"
prompt_template = "development_analysis.jinja"
display_style = "theme.phase.development_analysis"
[blocks.development_analysis.phase.artifact_history]
enabled = true
clear_on_fresh_entry = false
[blocks.development_analysis.phase.transitions]
on_success = "development_final_commit_cleanup"
on_loopback = "development"
[blocks.development_analysis.phase.loop_policy]
iteration_state_field = "development_analysis_iteration"
[blocks.development_analysis.phase.decisions.completed]
target = "development_final_commit_cleanup"
reset_loop = true
[blocks.development_analysis.phase.decisions.request_changes]
target = "development"
reset_loop = false
[blocks.development_analysis.phase.decisions.failed]
target = "development"
reset_loop = false

[blocks.development_final_commit_cleanup]
kind = "individual"
phase_name = "development_final_commit_cleanup"
[blocks.development_final_commit_cleanup.phase]
drain = "commit"
role = "commit_cleanup"
prompt_template = "commit_cleanup.jinja"
display_style = "theme.phase.commit"
[blocks.development_final_commit_cleanup.phase.transitions]
on_success = "development_final_commit"
on_loopback = "development_final_commit_cleanup"
on_failure = "failed_terminal"
[blocks.development_final_commit_cleanup.phase.loop_policy]
iteration_state_field = "commit_cleanup_iteration"

[blocks.development_final_commit]
kind = "individual"
phase_name = "development_final_commit"
[blocks.development_final_commit.phase]
drain = "development_commit"
role = "commit"
prompt_template = "commit_message.jinja"
display_style = "theme.phase.development_commit"
clear_drains_on_fresh_entry = ["development", "development_analysis"]
[blocks.development_final_commit.phase.artifact_history]
enabled = true
clear_on_fresh_entry = false
[blocks.development_final_commit.phase.transitions]
on_success = "complete"
on_failure = "failed_terminal"
[blocks.development_final_commit.phase.commit_policy]
requires_artifact = true
skipped_advances_progress = true
increments_counter = "iteration"
loop_resets = ["development_analysis_iteration", "commit_cleanup_iteration"]

[blocks.complete]
kind = "individual"
phase_name = "complete"
[blocks.complete.phase]
drain = "complete"
role = "terminal"
terminal_outcome = "success"
[blocks.complete.phase.transitions]
on_success = "complete"
on_loopback = "complete"

[blocks.failed_terminal]
kind = "individual"
phase_name = "failed_terminal"
[blocks.failed_terminal.phase]
drain = "failed_terminal"
role = "terminal"
terminal_outcome = "failure"
[blocks.failed_terminal.phase.transitions]
on_success = "failed_terminal"
on_loopback = "failed_terminal"

# ---------------------------------------------------------------------------
# Edit this only if you are changing what happens after a commit.
# Post-commit budget-guarded routing
# ---------------------------------------------------------------------------

[[post_commit_routes]]
target = "planning"
[post_commit_routes.when]
phase = "development_final_commit"
budget_state = "remaining"

[[post_commit_routes]]
target = "complete"
[post_commit_routes.when]
phase = "development_final_commit"
budget_state = "exhausted"

[[post_commit_routes]]
target = "complete"
[post_commit_routes.when]
phase = "development_final_commit"
budget_state = "no_review"

# ---------------------------------------------------------------------------
# Edit this only if you are changing retry behavior.
# Default retry policy
# ---------------------------------------------------------------------------

[default_phase_retry_policy]
max_retries = 3
retry_delay_ms = 1000
retry_in_session = false

# ---------------------------------------------------------------------------
# Edit this only if you are changing recovery after an agent failure.
# Recovery policy
# ---------------------------------------------------------------------------

[recovery]
cycle_cap = 200
failed_route = "failed_terminal"
terminal_failure_phase = "failed_terminal"
preserve_session_on_categories = ["agent"]
