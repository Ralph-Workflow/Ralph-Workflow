# [agents.pi]
# Pi.dev minimal coding-agent harness (https://pi.dev/). Install via either:
#   npm install -g @earendil-works/pi-coding-agent     # https://www.npmjs.com/package/@earendil-works/pi-coding-agent
#   curl -fsSL https://pi.dev/install.sh | sh           # https://pi.dev/ (official install script)
# Pi streams NDJSON events on stdout per https://pi.dev/docs/latest/json
# and has no native MCP config file; Ralph Workflow wires MCP through a
# generated Pi extension and retries clean exits without completion evidence
# against the captured Pi session.
# cmd = "pi"
# output_flag = "--mode json"
# yolo_flag = "--approve"
# json_parser = "pi"
# session_flag = "--session {}"
# can_commit = true
# display_name = "Pi"

# ---------------------------------------------------------------------------
# [agent_chains.*] — Named reusable chain definitions (list of agent names)
#
# Each chain is an ORDERED FALLBACK LIST: Ralph Workflow tries the first agent, and
# if it fails (or exhausts its retries) it moves to the next one.
#
# What KIND of model belongs where (plain language):
#   - planning / analysis  → your most capable, reviewer-grade model.
#   - development          → a strong coder model.
#   - commit               → a small/cheap/fast model is fine.
#
# The bundled defaults below use ONLY the default-active `claude` agent
# so a fresh first-run with just Claude installed works out of the box.
# To add a fallback agent, install it, confirm `which <binary>` works, then
# extend the chain's list. See docs/sphinx/agent-compatibility.md for the
# per-agent model-string syntax.
# ---------------------------------------------------------------------------

[agent_chains]
planning = ["claude/opus"]
development = ["claude/sonnet"]
analysis = ["claude/opus"]
commit = ["claude/haiku"]

# After you install opencode and confirm `opencode` is on PATH:
#   development = ["claude/sonnet", "opencode/openai/gpt-5.4"]
# After you install codex:
#   development = ["claude/sonnet", "codex"]
# CCS alternative example: planning = ["ccs/work"]
# See docs/sphinx/configuration.md#ccs_aliases for CCS details.

# ---------------------------------------------------------------------------
# [agent_drains.*] — Drain-to-chain bindings for pipeline drains
# A drain is a ROUTING LABEL that binds a pipeline phase to a chain.
# IMPORTANT: the bundled pipeline uses the drain set below.
# ---------------------------------------------------------------------------

[agent_drains]
planning = "planning"
planning_analysis = "analysis"
development = "development"
development_analysis = "analysis"
development_commit = "commit"
analysis = "analysis"
commit = "commit"
