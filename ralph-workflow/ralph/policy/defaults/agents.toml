# Default agents policy for Ralph Workflow.
#
# PURPOSE: Defines agent chains (fallback sequences) and drain-to-chain bindings.
#
# LOCATION: This file is the canonical default. Ralph Workflow reads overrides from:
#   - .agent/agents.toml (project-local, takes precedence over this file)
#
# REGENERATION: Run `ralph --regenerate-config` to refresh from this default.
#
# ============================================================
# OPTIONAL — everything below this line has a working default.
# Skip this file entirely unless you know you need it.
# ============================================================
# Edit this only if you want to change which agent handles a role.

# ---------------------------------------------------------------------------
# Agent chains
# ---------------------------------------------------------------------------
# Each chain is an ORDERED FALLBACK LIST: Ralph Workflow tries the first agent, and
# if it fails (or exhausts its retries) it moves to the next one.
#
# What KIND of model belongs where (plain language):
#   - planning / analysis  → your most capable, reviewer-grade model.
#   - development          → a strong coder model.
#   - commit               → a small/cheap/fast model is fine.
#
# The bundled defaults below use ONLY the default-active `claude` agent
# so a fresh first-run with just Claude installed works out of the box.
# The two bundled copies (this file's structured [agent_chains.*] tables
# and ralph-workflow.toml's flat list form) AGREE on this rule. To add a
# fallback agent, install it, confirm `which <binary>` works, then extend
# the chain's `agents = [...]` list below. See
# docs/sphinx/agent-compatibility.md for the per-agent model-string syntax.

[agent_chains.planning]
agents = ["claude"]
max_retries = 2
retry_delay_ms = 1000

[agent_chains.development]
agents = ["claude"]
max_retries = 3
retry_delay_ms = 1000

[agent_chains.development_analysis]
agents = ["claude"]
max_retries = 2
retry_delay_ms = 500

[agent_chains.planning_analysis]
agents = ["claude"]
max_retries = 2
retry_delay_ms = 500

[agent_chains.development_commit]
agents = ["claude"]
max_retries = 2
retry_delay_ms = 500

[agent_chains.analysis]
agents = ["claude"]
max_retries = 2
retry_delay_ms = 500

[agent_chains.commit]
agents = ["claude"]
max_retries = 2
retry_delay_ms = 500

# Out-of-graph policy-remediation chain. Invoked synchronously by the
# project-policy-readiness preflight (ralph/project_policy/) when the
# deterministic validator emits remediation-required findings. The chain
# is NOT referenced by any non-terminal pipeline phase, so the validator
# (validate_drain_contracts / validate_agent_chains_satisfiable) does not
# require its drain to be bound to a phase. The drain entry below is the
# binding that the synchronous out-of-graph remediation driver invokes
# through ralph/pipeline/effect_executor.execute_agent_effect.
[agent_chains.policy_remediation]
agents = ["claude"]
max_retries = 2
retry_delay_ms = 1000

# Out-of-graph policy-remediation ANALYSIS chain. The second phase of the
# hardcoded policy pipeline (ralph/project_policy/pipeline_graph.py): it
# reviews what the remediation agent wrote -- are the RALPH-FACTs true, do the
# declared gates actually resolve, do the gate scripts obey
# gate-script-policy.md -- and routes back to remediation or to done. Like the
# remediation chain it is bound to no pipeline phase.
[agent_chains.policy_remediation_analysis]
agents = ["claude"]
max_retries = 2
retry_delay_ms = 1000

# Out-of-graph rebase-conflict-resolution chain. Invoked by the hardcoded
# conflict-resolution pipeline (ralph/pipeline/conflict_resolution/) when an
# auto-integration endpoint merge stops on conflicts. Like the policy chains
# above it is bound to no phase in ralph/policy/defaults/pipeline.toml, so
# validate_drain_contracts / validate_agent_chains_satisfiable do not require a
# phase binding. The chain mirrors `development` because resolving a conflict
# is source editing under verification.
[agent_chains.rebase_conflict_resolution]
agents = ["claude"]
max_retries = 2
retry_delay_ms = 1000

# Edit this only if you are changing which chain handles a pipeline role.
# ---------------------------------------------------------------------------
# Drain bindings
# ---------------------------------------------------------------------------

[agent_drains.planning]
chain = "planning"
drain_class = "planning"

[agent_drains.development]
chain = "development"
drain_class = "development"

[agent_drains.development_analysis]
chain = "development_analysis"
drain_class = "analysis"

[agent_drains.planning_analysis]
chain = "planning_analysis"
drain_class = "analysis"

[agent_drains.development_commit]
chain = "development_commit"
drain_class = "commit"

[agent_drains.analysis]
chain = "analysis"
drain_class = "analysis"

[agent_drains.commit]
chain = "commit"
drain_class = "commit"

# Out-of-graph policy-remediation drain. Bound only to the dedicated
# policy_remediation chain; not referenced by any pipeline phase. The
# drain is exercised exclusively by the synchronous remediation driver
# from ralph/project_policy/remediation.py::remediate.
[agent_drains.policy_remediation]
chain = "policy_remediation"
drain_class = "development"

# Out-of-graph policy-remediation analysis drain. drain_class = "analysis"
# deliberately grants a READ-ONLY tool surface: the analysis agent gets
# artifact.submit (to return its decision) and process.exec_bounded (to probe
# that each declared gate command actually resolves), but NO workspace write.
# It structurally CANNOT fix what it reviews -- it can only observe and route
# back to the remediation phase. Exercised by
# ralph/project_policy/pipeline_driver.py.
[agent_drains.policy_remediation_analysis]
chain = "policy_remediation_analysis"
drain_class = "analysis"

# Out-of-graph rebase-conflict-resolution drain. Bound only to the dedicated
# rebase_conflict_resolution chain; not referenced by any pipeline phase.
# drain_class = "development" is deliberate: ralph/mcp/session_plan.py's
# development extras are what grant workspace.edit / workspace.write_tracked so
# the agent can rewrite the conflicted files, and the base capability set grants
# artifact.submit, which ralph/mcp/tools/coordination.py::handle_declare_complete
# requires for the completion contract. The agent still cannot run git: the
# session's exec policy (ralph/mcp/tools/exec.py::apply_exec_policy) denies every
# vcs invocation, so Ralph Workflow alone stages the resolved paths and creates
# the merge commit. Exercised by
# ralph/pipeline/conflict_resolution/driver.py::run_conflict_resolution_pipeline.
[agent_drains.rebase_conflict_resolution]
chain = "rebase_conflict_resolution"
drain_class = "development"
