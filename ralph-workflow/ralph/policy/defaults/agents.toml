# Default agents policy for Ralph Workflow.
#
# PURPOSE: Defines agent chains (fallback sequences) and drain-to-chain bindings.
#
# LOCATION: This file is the canonical default. Ralph Workflow reads overrides from:
#   - .agent/agents.toml (project-local, takes precedence over this file)
#
# REGENERATION: Run `ralph --regenerate-config` to refresh from this default.
#
# MINIMUM REQUIRED SECTIONS: [agent_chains] and [agent_drains] must both be present.
# Chains are ordered fallback lists. Ralph Workflow tries agents in order;
# on failure it retries up to max_retries times before advancing to the next agent.
# After all agents in a chain are exhausted, the pipeline fails.

# ---------------------------------------------------------------------------
# Agent chains
# ---------------------------------------------------------------------------

[agent_chains.planning]
agents = ["claude"]
max_retries = 2
retry_delay_ms = 1000

[agent_chains.development]
agents = ["claude", "opencode"]
max_retries = 3
retry_delay_ms = 1000

[agent_chains.development_analysis]
agents = ["claude"]
max_retries = 2
retry_delay_ms = 500

[agent_chains.planning_analysis]
agents = ["claude"]
max_retries = 2
retry_delay_ms = 500

[agent_chains.development_commit]
agents = ["claude"]
max_retries = 2
retry_delay_ms = 500

[agent_chains.analysis]
agents = ["claude"]
max_retries = 2
retry_delay_ms = 500

[agent_chains.commit]
agents = ["claude"]
max_retries = 2
retry_delay_ms = 500

# Out-of-graph policy-remediation chain. Invoked synchronously by the
# project-policy-readiness preflight (ralph/project_policy/) when the
# deterministic validator emits remediation-required findings. The chain
# is NOT referenced by any non-terminal pipeline phase, so the validator
# (validate_drain_contracts / validate_agent_chains_satisfiable) does not
# require its drain to be bound to a phase. The drain entry below is the
# binding that the synchronous out-of-graph remediation driver invokes
# through ralph/pipeline/effect_executor.execute_agent_effect.
[agent_chains.policy_remediation]
agents = ["claude"]
max_retries = 2
retry_delay_ms = 1000

# ---------------------------------------------------------------------------
# Drain bindings
# ---------------------------------------------------------------------------

[agent_drains.planning]
chain = "planning"
drain_class = "planning"

[agent_drains.development]
chain = "development"
drain_class = "development"

[agent_drains.development_analysis]
chain = "development_analysis"
drain_class = "analysis"

[agent_drains.planning_analysis]
chain = "planning_analysis"
drain_class = "analysis"

[agent_drains.development_commit]
chain = "development_commit"
drain_class = "commit"

[agent_drains.analysis]
chain = "analysis"
drain_class = "analysis"

[agent_drains.commit]
chain = "commit"
drain_class = "commit"

# Out-of-graph policy-remediation drain. Bound only to the dedicated
# policy_remediation chain; not referenced by any pipeline phase. The
# drain is exercised exclusively by the synchronous remediation driver
# from ralph/project_policy/remediation.py::remediate.
[agent_drains.policy_remediation]
chain = "policy_remediation"
drain_class = "development"
