[mypy]
strict = true
python_version = 3.14
mypy_path = stubs

# Ensure we have typing on everything, **DO NOT RELAX THIS**
# The flags below are NOT enabled by strict = true; they must be set explicitly.
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
no_implicit_optional = True
warn_unused_ignores = True
warn_unused_configs = True
warn_return_any = True
warn_unreachable = True
strict_equality = True
enable_error_code = ignore-without-code

# Disallow Any in all forms — explicit, decorated, unstubbed imports, and expressions.
# disallow_any_generics is already covered by strict = true.
# disallow_any_expr is the primary guard against dynamic metaprogramming and monkey
# patching: it blocks Any-typed expressions, which are the main mechanism used to
# bypass type checking via dynamic attribute access, setattr, __dict__ mutation, etc.
disallow_any_explicit = True
disallow_any_decorated = True
disallow_any_unimported = True
disallow_any_expr = True

[mypy-typer.*]
ignore_missing_imports = true

[mypy-rich.*]
ignore_missing_imports = true

[mypy-rich_click.*]
ignore_missing_imports = true

[mypy-git.*]
ignore_missing_imports = true

[mypy-tqdm.*]
ignore_missing_imports = true

[mypy-tomli.*]
ignore_missing_imports = true

[mypy-ddgs]
ignore_missing_imports = true

[mypy-readability]
follow_imports = silent
ignore_missing_imports = true

[mypy-selectolax]
follow_imports = silent
ignore_missing_imports = true

[mypy-selectolax.*]
follow_imports = silent
ignore_missing_imports = true

# Architectural refactoring needed: Protocol with Callable[..., None] triggers disallow_any_expr.
[mypy-ralph.banner]
ignore_errors = True

# Architectural refactoring needed: dynamic module attribute access returns Any.
[mypy-ralph.recovery.controller]
ignore_errors = True

# Architectural refactoring needed: dynamic attribute access in module initialization.
[mypy-ralph.agents]
ignore_errors = True

# False positive: unreachable statements after conditional return in nested function.
[mypy-ralph.pipeline.runner]
ignore_errors = True
